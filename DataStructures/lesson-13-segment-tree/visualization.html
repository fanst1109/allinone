  .node-r.visited { fill: #dbeafe; stroke: #3b82f6; }
  .node-r.taken { fill: #d1fae5; stroke: #10b981; stroke-width: 2.5; }
  .node-r.outside { opacity: .35; }
  .edge { stroke: #aaa; stroke-width: 1.5; }
  text { font: 600 13px sans-serif; text-anchor: middle; dominant-baseline: central; fill: #222; }
  .range { font: 400 10px sans-serif; fill: #666; }
  .array { display: flex; gap: 4px; margin: 12px 0; }
  .cell { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border: 2px solid #555; border-radius: 6px; background: #fff; font-weight: 600; position: relative; }
  .cell .idx { position: absolute; top: -16px; font-size: 11px; color: #888; font-weight: 400; }
  .cell.in-range { background: #dbeafe; border-color: #3b82f6; }

<body>
<main>

<h1>Segment Tree — Range Sum Query</h1>

<div class="panel">
  <div class="row">
    L = <input id="ql" type="number" value="2" min="0" max="7">
    R = <input id="qr" type="number" value="5" min="0" max="7">
    <label>Op: <select id="op" onchange="changeOp()">
      <option value="sum">Sum (mục 2 README)</option>
      <option value="min">Min (bài 2 README)</option>
      <option value="max">Max</option>
    </select></label>
    <button onclick="doQuery()">Query [L..R]</button>
    <button onclick="doUpdate()">Update arr[L] = R (set giá trị)</button>
    <button onclick="reset()">Reset</button>
  </div>
  <div>Mảng gốc:</div>
  <div class="array" id="arrDiv"></div>
  <svg id="svg" width="980" height="320" viewBox="0 0 980 320" preserveAspectRatio="xMidYMid meet"></svg>
  <div class="log" id="log">Node xanh: bị duyệt qua. Node xanh đậm: nằm trọn trong khoảng truy vấn, lấy giá trị trực tiếp.</div>
</div>

<script>
let arr = [1, 3, 5, 7, 9, 11, 13, 15];
const N = arr.length;
let tree = new Array(4 * N).fill(0);
let visited = new Set(), taken = new Set();
let op = 'sum';

const OPS = {
  sum: { combine: (a, b) => a + b, identity: 0 },
  min: { combine: (a, b) => Math.min(a, b), identity: Infinity },
  max: { combine: (a, b) => Math.max(a, b), identity: -Infinity },
};

function build(node, l, r) {
  if (l === r) { tree[node] = arr[l]; return; }
  const m = (l + r) >> 1;
  build(2 * node, l, m); build(2 * node + 1, m + 1, r);
  tree[node] = OPS[op].combine(tree[2 * node], tree[2 * node + 1]);
}
build(1, 0, N - 1);

function query(node, l, r, ql, qr) {
  if (qr < l || r < ql) return OPS[op].identity;
  visited.add(node);
  if (ql <= l && r <= qr) { taken.add(node); return tree[node]; }
  const m = (l + r) >> 1;
  return OPS[op].combine(query(2 * node, l, m, ql, qr), query(2 * node + 1, m + 1, r, ql, qr));
}

function pointSet(node, l, r, i, val) {
  visited.add(node);
  if (l === r) { tree[node] = val; return; }
  const m = (l + r) >> 1;
  if (i <= m) pointSet(2 * node, l, m, i, val);
  else pointSet(2 * node + 1, m + 1, r, i, val);
  tree[node] = OPS[op].combine(tree[2 * node], tree[2 * node + 1]);
}
function changeOp() {
  op = document.getElementById('op').value;
  tree = new Array(4 * N).fill(OPS[op].identity);
  build(1, 0, N - 1);
  visited = new Set(); taken = new Set();
  render();
  log(`Đổi op = ${op}. Tree được build lại với combine(${op === 'sum' ? '+' : op === 'min' ? 'min' : 'max'}).`);
}

function layoutNode(node, l, r, x, y, dx, list, edges) {
  list.push({ node, l, r, x, y });
  if (l === r) return;
  const m = (l + r) >> 1;
  const lcX = x - dx, rcX = x + dx, cy = y + 70;
  edges.push([x, y, lcX, cy]); edges.push([x, y, rcX, cy]);
  layoutNode(2 * node, l, m, lcX, cy, Math.max(dx / 1.8, 30), list, edges);
  layoutNode(2 * node + 1, m + 1, r, rcX, cy, Math.max(dx / 1.8, 30), list, edges);
}

function render(qRange = null) {
  // array
  const arrDiv = document.getElementById('arrDiv');
  arrDiv.innerHTML = '';
  arr.forEach((v, i) => {
    const inR = qRange && i >= qRange.l && i <= qRange.r;
    const c = document.createElement('div');
    c.className = 'cell' + (inR ? ' in-range' : '');
    c.innerHTML = `<span class="idx">${i}</span>${v}`;
    arrDiv.appendChild(c);
  });
  // tree
  const svg = document.getElementById('svg');
  svg.innerHTML = '';
  const list = [], edges = [];
  layoutNode(1, 0, N - 1, 490, 30, 220, list, edges);
  edges.forEach(([x1, y1, x2, y2]) => svg.insertAdjacentHTML('beforeend', `<line class="edge" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`));
  list.forEach(({ node, l, r, x, y }) => {
    let cls = '';
    if (taken.has(node)) cls = 'taken';
    else if (visited.has(node)) cls = 'visited';
    else if (qRange && (r < qRange.l || l > qRange.r)) cls = 'outside';
    svg.insertAdjacentHTML('beforeend',
      `<rect class="node-r ${cls}" x="${x - 26}" y="${y - 17}" width="52" height="34" rx="6"/>
       <text x="${x}" y="${y - 4}">${tree[node]}</text>
       <text class="range" x="${x}" y="${y + 9}">[${l},${r}]</text>`);
  });
}

function doQuery() {
  const l = parseInt(document.getElementById('ql').value);
  const r = parseInt(document.getElementById('qr').value);
  if (l > r || l < 0 || r >= N) { log('L/R không hợp lệ'); return; }
  visited = new Set(); taken = new Set();
  const res = query(1, 0, N - 1, l, r);
  log(`${op}([${l}..${r}]) = ${res}. Đã duyệt ${visited.size} node, lấy giá trị từ ${taken.size} node (so với ${r - l + 1} phần tử) → O(log n).`);
  render({ l, r });
}

function doUpdate() {
  const i = parseInt(document.getElementById('ql').value);
  const val = parseInt(document.getElementById('qr').value);
  visited = new Set(); taken = new Set();
  arr[i] = val;
  pointSet(1, 0, N - 1, i, val);
  log(`Update arr[${i}] = ${val}. Đi xuống lá theo đường ${visited.size} node, cập nhật lên gốc bằng combine(${op}).`);
  render({ l: i, r: i });
}

function reset() {
  arr = [1, 3, 5, 7, 9, 11, 13, 15];
  tree = new Array(4 * N).fill(OPS[op].identity);
  build(1, 0, N - 1);
  visited = new Set(); taken = new Set();
  render();
  log('Reset về mảng [1,3,5,7,9,11,13,15] của README.');
}
function log(m) { document.getElementById('log').textContent = m; }
render();
</script></main>

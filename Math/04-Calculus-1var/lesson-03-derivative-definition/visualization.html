<h1>Lesson 03 (T4) — Đạo hàm = slope tiếp tuyến</h1>

<h2>Cát tuyến → Tiếp tuyến khi h → 0</h2>
<div class="card">
  <p>Đồ thị y = x². Đường vàng = cát tuyến qua 2 điểm cách nhau h. Kéo trượt giảm h, cát tuyến tiến về tiếp tuyến (xanh lá).</p>
  <div class="row">
    <label>x (điểm khảo sát):</label>
    <input type="range" id="x0" min="-3" max="3" step="0.1" value="1.5" oninput="draw()">
    <span class="stat">x = <strong id="vX">1.5</strong></span>
  </div>
  <div class="row">
    <label>h (khoảng cách):</label>
    <input type="range" id="h" min="0.01" max="2" step="0.01" value="1" oninput="draw()">
    <span class="stat">h = <strong id="vH">1</strong></span>
  </div>
  <svg class="scene" id="svg" viewBox="0 0 700 400"></svg>
  <div class="result" id="res"></div>
</div>

<script>
function draw() {
  const x0 = parseFloat(document.getElementById("x0").value);
  const h = parseFloat(document.getElementById("h").value);
  document.getElementById("vX").textContent = x0.toFixed(2);
  document.getElementById("vH").textContent = h.toFixed(2);

  const svg = document.getElementById("svg");
  svg.innerHTML = "";
  const W = 700, H = 400, cx = 350, cy = 350;
  const scale = 40;

  // Grid
  for (let i = -8; i <= 8; i++) {
    const x = cx + i*scale;
    if (x > 0 && x < W) {
      const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
      l.setAttribute("x1", x); l.setAttribute("y1", 10); l.setAttribute("x2", x); l.setAttribute("y2", H-20);
      l.setAttribute("stroke", i === 0 ? "#1a202c" : "#e2e8f0"); l.setAttribute("stroke-width", i === 0 ? 1.5 : 0.5);
      svg.appendChild(l);
    }
  }
  for (let i = 0; i <= 10; i++) {
    const y = cy - i*30;
    if (y > 0 && y < H) {
      const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
      l.setAttribute("x1", 30); l.setAttribute("y1", y); l.setAttribute("x2", W-20); l.setAttribute("y2", y);
      l.setAttribute("stroke", i === 0 ? "#1a202c" : "#e2e8f0"); l.setAttribute("stroke-width", i === 0 ? 1.5 : 0.5);
      svg.appendChild(l);
    }
  }

  const xToPx = x => cx + x*scale;
  const yToPx = y => cy - y*30;
  const fn = x => x*x;

  // Draw y = x²
  let path = "";
  for (let x = -5; x <= 5; x += 0.05) {
    const y = fn(x);
    if (y > 12) continue;
    const px = xToPx(x), py = yToPx(y);
    path += (x === -5 ? "M" : "L") + px + " " + py + " ";
  }
  const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
  p.setAttribute("d", path); p.setAttribute("fill", "none"); p.setAttribute("stroke", "#1d4ed8"); p.setAttribute("stroke-width", 2.5);
  svg.appendChild(p);

  // Point A = (x0, f(x0))
  const yA = fn(x0);
  const Ax = xToPx(x0), Ay = yToPx(yA);
  // Point B = (x0+h, f(x0+h))
  const yB = fn(x0+h);
  const Bx = xToPx(x0+h), By = yToPx(yB);

  // Secant line through A, B extended
  const slope_sec = (yB - yA) / h;
  // Tangent slope = 2x (for f=x²)
  const slope_tan = 2 * x0;

  // Draw secant (yellow) - long line
  const sec_y_at_xMin = yA + slope_sec * (-5 - x0);
  const sec_y_at_xMax = yA + slope_sec * (5 - x0);
  const sec = document.createElementNS("http://www.w3.org/2000/svg", "line");
  sec.setAttribute("x1", xToPx(-5)); sec.setAttribute("y1", yToPx(sec_y_at_xMin));
  sec.setAttribute("x2", xToPx(5)); sec.setAttribute("y2", yToPx(sec_y_at_xMax));
  sec.setAttribute("stroke", "#d97706"); sec.setAttribute("stroke-width", 2); sec.setAttribute("stroke-dasharray", "6,4");
  svg.appendChild(sec);

  // Draw tangent (green)
  const tan_y_min = yA + slope_tan * (-5 - x0);
  const tan_y_max = yA + slope_tan * (5 - x0);
  const tan = document.createElementNS("http://www.w3.org/2000/svg", "line");
  tan.setAttribute("x1", xToPx(-5)); tan.setAttribute("y1", yToPx(tan_y_min));
  tan.setAttribute("x2", xToPx(5)); tan.setAttribute("y2", yToPx(tan_y_max));
  tan.setAttribute("stroke", "#15803d"); tan.setAttribute("stroke-width", 2.5);
  svg.appendChild(tan);

  // Points
  [[Ax, Ay, "A(" + x0.toFixed(2) + ", " + yA.toFixed(2) + ")", "#dc2626"],
   [Bx, By, "B(" + (x0+h).toFixed(2) + ", " + yB.toFixed(2) + ")", "#d97706"]].forEach(([x,y,lbl,c]) => {
    const cir = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    cir.setAttribute("cx", x); cir.setAttribute("cy", y); cir.setAttribute("r", 6);
    cir.setAttribute("fill", c);
    svg.appendChild(cir);
    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("x", x+10); t.setAttribute("y", y-8); t.setAttribute("fill", c); t.setAttribute("font-weight", "700"); t.setAttribute("font-size", "12");
    t.textContent = lbl;
    svg.appendChild(t);
  });

  document.getElementById("res").innerHTML = `
    <div style="font-family:monospace; font-size:14px">f(x) = x², khảo sát tại x = ${x0.toFixed(2)}</div>
    <div style="font-family:monospace; font-size:14px; margin-top:6px">Slope cát tuyến (vàng) = [f(${(x0+h).toFixed(2)}) - f(${x0.toFixed(2)})]/h = [${yB.toFixed(3)} - ${yA.toFixed(3)}]/${h.toFixed(2)} = <strong>${slope_sec.toFixed(4)}</strong></div>
    <div style="font-family:monospace; font-size:14px">Slope tiếp tuyến (xanh lá) = f'(${x0.toFixed(2)}) = 2·${x0.toFixed(2)} = <strong>${slope_tan.toFixed(4)}</strong></div>
    <div style="margin-top:6px; padding:8px; background:#fef9c3; border-radius:6px">Khoảng cách slope: <strong>${Math.abs(slope_sec - slope_tan).toFixed(4)}</strong>. Giảm h → 0, slope cát tuyến → slope tiếp tuyến.</div>
    <div style="margin-top:6px">PT tiếp tuyến: y = ${yA.toFixed(2)} + ${slope_tan.toFixed(2)}(x − ${x0.toFixed(2)}) = ${slope_tan.toFixed(2)}x ${-x0*slope_tan+yA >= 0 ? "+" : ""} ${(-x0*slope_tan+yA).toFixed(2)}</div>
  `;
}

draw();
</script>

</main>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../tools/viz-base.css">
<title>Lesson 08 — Min-Heap trực quan</title>
<style>
  .panel { background: #fff; border-radius: 8px; padding: 16px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 16px; }
  h1 { margin: 0 0 8px 0; } h2 { margin: 4px 0 8px 0; }
  svg { background: #fafafa; border: 1px solid #eee; border-radius: 6px; display: block; width: 100%; max-width: 760px; }
  .node-c { fill: #fff; stroke: #333; stroke-width: 2; transition: all .3s; }
  .node-c.current { fill: #d1fae5; stroke: #10b981; }
  .node-c.swap { fill: #fef08a; stroke: #ca8a04; }
  .node-c.new { fill: #dbeafe; stroke: #3b82f6; }
  .node-c.removed { fill: #fee2e2; stroke: #ef4444; }
  .edge { stroke: #888; stroke-width: 2; }
  text { font: 600 14px sans-serif; text-anchor: middle; dominant-baseline: central; }
  .array { display: flex; gap: 4px; margin: 12px 0; flex-wrap: wrap; }
  .cell { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border: 2px solid #555; border-radius: 6px; background: #fff; font-weight: 600; position: relative; transition: all .3s; }
  .cell .idx { position: absolute; top: -16px; font-size: 11px; color: #888; font-weight: 400; }
  .cell.current { background: #d1fae5; border-color: #10b981; }
  .cell.swap { background: #fef08a; border-color: #ca8a04; }
  .cell.new { background: #dbeafe; border-color: #3b82f6; }
  button { background: #3b82f6; color: #fff; border: 0; padding: 8px 14px; border-radius: 6px; cursor: pointer; margin-right: 6px; }
  button:disabled { background: #aaa; }
  input { padding: 4px; width: 80px; }
  .log { color: #444; min-height: 22px; margin-top: 8px; font-family: monospace; font-size: 13px; }
  button.secondary { background: #64748b; }
  button.green { background: #10b981; }
  select { padding: 4px 6px; }
  input[type=text] { width: 200px; }
</style>
</head>
<body>
<main>
<nav class="viz-nav">
  <a href="../index.html">🏠 Trang chính</a>
  <span class="sep">·</span>
  <a href="../lesson-07-binary-search-tree/visualization.html">← L7: BST</a>
  <span class="sep">·</span>
  <span class="current">L8: Heap & PQ</span>

</nav>

<h1>Min-Heap — biểu diễn mảng + cây</h1>

<div class="panel">
  <label>Giá trị: <input id="val" type="number" value="5"></label>
  <button onclick="doInsert()">Insert (sift up)</button>
  <button onclick="doExtract()">Extract Min (sift down)</button>
  <button class="secondary" onclick="reset()">Reset (heap demo)</button>
  <br>
  <label style="margin-top:8px; display:inline-block;">Mảng đầu vào (cách nhau dấu phẩy): <input id="bhArr" type="text" value="4,1,7,3,2,6,5"></label>
  <button class="green" onclick="buildHeap()">▶ Build Heap O(n) (bài 1/5 README)</button>
  <button class="secondary" onclick="setEmpty()">Xóa hết</button>
  <h2>Cây (cha-con)</h2>
  <svg id="svg" width="760" height="320" viewBox="0 0 760 320" preserveAspectRatio="xMidYMid meet"></svg>
  <h2>Mảng cùng dữ liệu</h2>
  <div class="array" id="arr"></div>
  <div class="log" id="log">Min-heap: mỗi node ≤ con. Cha của i là (i-1)/2; con 2i+1 và 2i+2.</div>
</div>

<script>
let heap = [1, 3, 2, 7, 5, 4, 8];
let hl = {}; // index -> 'current'/'swap'/'new'

function renderArray() {
  const root = document.getElementById('arr');
  root.innerHTML = '';
  heap.forEach((v, i) => {
    const c = document.createElement('div');
    c.className = 'cell ' + (hl[i] || '');
    c.innerHTML = `<span class="idx">${i}</span>${v}`;
    root.appendChild(c);
  });
}

function renderTree() {
  const svg = document.getElementById('svg');
  svg.innerHTML = '';
  const n = heap.length;
  if (!n) return;
  // layout: BFS, mỗi tầng chia đều ngang
  const positions = [];
  const depth = Math.floor(Math.log2(n)) + 1;
  for (let i = 0; i < n; i++) {
    const d = Math.floor(Math.log2(i + 1));
    const idxInLevel = i - ((1 << d) - 1);
    const levelCount = 1 << d;
    const x = (idxInLevel + 0.5) * (760 / levelCount);
    const y = 40 + d * 80;
    positions[i] = { x, y };
  }
  // edges first
  for (let i = 1; i < n; i++) {
    const p = positions[(i - 1) >> 1];
    const c = positions[i];
    svg.insertAdjacentHTML('beforeend', `<line class="edge" x1="${p.x}" y1="${p.y}" x2="${c.x}" y2="${c.y}"/>`);
  }
  // nodes
  for (let i = 0; i < n; i++) {
    const k = hl[i] || '';
    const { x, y } = positions[i];
    svg.insertAdjacentHTML('beforeend',
      `<circle class="node-c ${k}" cx="${x}" cy="${y}" r="20"/>
       <text x="${x}" y="${y}">${heap[i]}</text>`);
  }
}

function render() { renderArray(); renderTree(); }

async function doInsert() {
  const v = parseInt(document.getElementById('val').value);
  heap.push(v);
  let i = heap.length - 1;
  hl = { [i]: 'new' };
  render();
  log(`Thêm ${v} vào cuối (index ${i}), giờ sift up.`);
  await sleep(700);
  while (i > 0) {
    const p = (i - 1) >> 1;
    hl = { [i]: 'current', [p]: 'current' };
    render();
    await sleep(500);
    if (heap[p] <= heap[i]) {
      log(`heap[${p}]=${heap[p]} ≤ heap[${i}]=${heap[i]} → dừng.`);
      break;
    }
    hl = { [i]: 'swap', [p]: 'swap' };
    log(`heap[${p}]=${heap[p]} > heap[${i}]=${heap[i]} → đổi chỗ.`);
    [heap[i], heap[p]] = [heap[p], heap[i]];
    render();
    await sleep(500);
    i = p;
  }
  hl = {};
  render();
}

async function doExtract() {
  if (!heap.length) return;
  const min = heap[0];
  hl = { 0: 'removed' };
  render();
  log(`extractMin() = ${min}. Lấy phần tử cuối lên gốc rồi sift down.`);
  await sleep(700);
  heap[0] = heap[heap.length - 1];
  heap.pop();
  hl = { 0: 'new' };
  render();
  await sleep(500);
  let i = 0;
  while (true) {
    const l = 2 * i + 1, r = 2 * i + 2;
    let smallest = i;
    if (l < heap.length && heap[l] < heap[smallest]) smallest = l;
    if (r < heap.length && heap[r] < heap[smallest]) smallest = r;
    hl = { [i]: 'current' };
    if (l < heap.length) hl[l] = 'current';
    if (r < heap.length) hl[r] = 'current';
    render();
    await sleep(500);
    if (smallest === i) {
      log('Vị trí hiện tại nhỏ hơn cả 2 con (hoặc lá) → dừng.');
      break;
    }
    hl = { [i]: 'swap', [smallest]: 'swap' };
    log(`heap[${i}]=${heap[i]} > min(con) = heap[${smallest}]=${heap[smallest]} → đổi.`);
    [heap[i], heap[smallest]] = [heap[smallest], heap[i]];
    render();
    await sleep(500);
    i = smallest;
  }
  hl = {};
  render();
}

function reset() { heap = [1, 3, 2, 7, 5, 4, 8]; hl = {}; render(); log('Reset về heap demo của README §3.'); }
function setEmpty() { heap = []; hl = {}; render(); log('Heap rỗng.'); }
function log(m) { document.getElementById('log').textContent = m; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function buildHeap() {
  const arr = document.getElementById('bhArr').value.split(',').map(s => parseInt(s.trim())).filter(x => !isNaN(x));
  heap = [...arr];
  hl = {};
  render();
  log(`Bắt đầu buildHeap trên mảng [${arr.join(', ')}]. Lặp i từ n/2-1 = ${Math.floor(arr.length/2) - 1} xuống 0, mỗi lần siftDown.`);
  await sleep(900);
  const start = Math.floor(heap.length / 2) - 1;
  let totalOps = 0;
  for (let i = start; i >= 0; i--) {
    hl = { [i]: 'new' };
    render();
    log(`siftDown(${i}) — node val=${heap[i]}, depth từ đáy = ${Math.floor(Math.log2(heap.length)) - Math.floor(Math.log2(i+1))}.`);
    await sleep(600);
    let cur = i;
    while (true) {
      const l = 2 * cur + 1, r = 2 * cur + 2;
      let s = cur;
      if (l < heap.length && heap[l] < heap[s]) s = l;
      if (r < heap.length && heap[r] < heap[s]) s = r;
      if (s === cur) break;
      hl = { [cur]: 'swap', [s]: 'swap' };
      render();
      await sleep(400);
      [heap[cur], heap[s]] = [heap[s], heap[cur]];
      totalOps++;
      cur = s;
      render();
      await sleep(300);
    }
  }
  hl = {};
  render();
  log(`Xong. Heap = [${heap.join(', ')}]. Tổng swap ≈ ${totalOps}. Bài 5 README: tổng siftDown ≤ Σ h_node ≤ n → O(n), không phải O(n log n) như insert lần lượt.`);
}

render();
</script></main>

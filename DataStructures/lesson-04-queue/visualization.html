  .cell.front.rear::before { content: 'front=rear'; left: 0; background: #7c3aed; }

<body>
<nav class="top">

</nav>
<main>
<h1>Circular Queue (cap = 8)</h1>

<div class="panel">
  <div class="ring" id="ring"></div>
  <label>Giá trị: <input id="val" type="number" value="42"></label>
  <button onclick="enq()">Enqueue</button>
  <button onclick="deq()">Dequeue</button>
  <button onclick="reset()">Reset</button>
  <div class="log" id="log"></div>
  <p style="color:#666;font-size:14px">front: vị trí phần tử kế tiếp sẽ dequeue. rear: vị trí phần tử kế tiếp sẽ enqueue ghi vào. Cả hai chạy vòng (mod 8).</p>
</div>

<script>
const CAP = 8;
let data = new Array(CAP).fill(null);
let front = 0, size = 0;
function rear() { return (front + size) % CAP; }
function render() {
  const ring = document.getElementById('ring');
  ring.innerHTML = '';
  for (let i = 0; i < CAP; i++) {
    const c = document.createElement('div');
    c.className = 'cell' + (data[i] !== null ? ' filled' : '')
                          + (i === front && size > 0 ? ' front' : '')
                          + (i === rear() ? ' rear' : '');
    c.textContent = data[i] === null ? '' : data[i];
    ring.appendChild(c);
  }
}
function enq() {
  if (size === CAP) { document.getElementById('log').textContent = 'Queue đầy!'; return; }
  const v = document.getElementById('val').value;
  data[rear()] = v;
  size++;
  document.getElementById('log').textContent = `enqueue(${v}) — O(1)`;
  render();
}
function deq() {
  if (size === 0) { document.getElementById('log').textContent = 'Queue rỗng!'; return; }
  const v = data[front];
  data[front] = null;
  front = (front + 1) % CAP;
  size--;
  document.getElementById('log').textContent = `dequeue() = ${v} — O(1)`;
  render();
}
function reset() { data = new Array(CAP).fill(null); front = 0; size = 0; render(); document.getElementById('log').textContent = ''; }
render();
</script>
<div class="readme-backdrop" id="readmeBackdrop" onclick="if(event.target===this)closeReadme()">
  <div class="readme-modal">
    <button class="close" onclick="closeReadme()" aria-label="Đóng">×</button>
    <div class="content" id="readmeContent">Đang tải README…</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
function openReadme() {
  document.getElementById('readmeBackdrop').classList.add('open');
  const el = document.getElementById('readmeContent');
  if (el.dataset.loaded === '1') return;
  fetch('./README.md').then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(md => {
      el.innerHTML = (typeof marked !== 'undefined' && marked.parse)
        ? marked.parse(md) : '<pre>' + md.replace(/</g, '&lt;') + '</pre>';
      el.dataset.loaded = '1';
    })
    .catch(() => {
      el.innerHTML =
        '<div class="fallback"><strong>Không tải được README qua <code>file://</code></strong> ' +
        '(trình duyệt chặn <code>fetch</code> cho local file).<br><br>' +
        'Cách khắc phục:<br>' +
        '· Mở trực tiếp file: <a href="./README.md" target="_blank">README.md</a><br>' +
        '· Hoặc chạy web server đơn giản trong thư mục lĩnh vực:<br>' +
        '<pre>cd DataStructures &amp;&amp; python3 -m http.server 8000</pre>' +
        'rồi mở <a href="http://localhost:8000/">http://localhost:8000/</a></div>';
    });
}
function closeReadme() { document.getElementById('readmeBackdrop').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReadme(); });
</script>
</main>
</body>

<style>
  .panel { background: #fff; border-radius: 8px; padding: 16px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  h1 { margin-top: 0; }

  .node-c { fill: #fff; stroke: #333; stroke-width: 2; transition: fill .25s, stroke .25s; }
  .node-c.path { fill: #fef08a; stroke: #ca8a04; }

  .edge { stroke: #888; stroke-width: 2; }
  text { font: 600 14px sans-serif; text-anchor: middle; dominant-baseline: central; }
  button { background: #3b82f6; color: #fff; border: 0; padding: 8px 14px; border-radius: 6px; cursor: pointer; margin-right: 6px; }
  input { padding: 4px; width: 80px; }
  .log { color: #444; margin-top: 8px; min-height: 22px; }
  .node-c.succ { fill: #dbeafe; stroke: #3b82f6; }
  .node-c.del { fill: #fee2e2; stroke: #ef4444; }
  pre.code { background: #1e293b; color: #e2e8f0; padding: 10px 14px; border-radius: 6px; font-size: 12px; }

  .stack-col { display: flex; flex-direction: column; gap: 12px; align-items: stretch; }
  .stack-col svg { max-width: 700px; }
  .stack-col pre.code { max-width: 700px; }
  .stats { font-family: monospace; font-size: 13px; color: #555; margin-top: 6px; }
  select { padding: 4px 6px; }
  button.danger { background: #ef4444; }
  button.secondary { background: #64748b; }
</style>
</head>
<body>
<main>
<nav class="viz-nav">
  <a href="../index.html">🏠 Trang chính</a>
  <span class="sep">·</span>
  <a href="../lesson-06-tree/visualization.html">← L6: Tree</a>

<h1>Binary Search Tree</h1>

<div class="panel">
  <label>Giá trị: <input id="v" type="number" value="42"></label>
  <button onclick="doInsert()">Insert</button>
  <button onclick="doSearch()">Search</button>
  <button class="danger" onclick="doDelete()">Delete</button>
  <button class="secondary" onclick="reset()">Reset</button>
  <label style="margin-left:8px;">Preset:
    <select id="preset" onchange="loadPreset()">
      <option value="empty">— rỗng —</option>
      <option value="demo" selected>Demo (50,30,70,20,40,60,80,35)</option>
      <option value="bai1">Bài 1 README (5,3,8,1,4,7,9)</option>
      <option value="bad">Suy biến (1,2,3,4,5,6,7)</option>
    </select>
  </label>
  <div class="stack-col" style="margin-top:10px;">
    <svg id="svg" width="700" height="380" viewBox="0 0 700 380" preserveAspectRatio="xMidYMid meet"></svg>
    <pre class="code" id="pseudo">Bấm Insert / Search / Delete để xem pseudocode.</pre>
  </div>
  <div class="stats" id="stats"></div>
  <div class="log" id="log"></div>
</div>

<script>
let root = null;
function ins(n, v) { if (!n) return {v, l: null, r: null}; if (v < n.v) n.l = ins(n.l, v); else if (v > n.v) n.r = ins(n.r, v); return n; }
function* search(n, v, path) {
  if (!n) { yield { done: true, found: false, path }; return; }
  path.push(n);
  yield { done: false, current: n, path: [...path] };
  if (v === n.v) { yield { done: true, found: true, path: [...path] }; return; }
  if (v < n.v) yield* search(n.l, v, path);
  else yield* search(n.r, v, path);
}
function layout(n, x, y, dx, nodes, edges) {
  if (!n) return;
  n.__pos = { x, y };
  nodes.push(n);
  if (n.l) { edges.push([n, n.l]); layout(n.l, x - dx, y + 70, dx / 1.7, nodes, edges); }
  if (n.r) { edges.push([n, n.r]); layout(n.r, x + dx, y + 70, dx / 1.7, nodes, edges); }
}
function render(highlight = {}) {
  const svg = document.getElementById('svg');
  svg.innerHTML = '';
  if (!root) return;
  const nodes = [], edges = [];
  layout(root, 400, 40, 180, nodes, edges);
  // Auto-fit viewBox theo bounding box thực của cây (đảm bảo node biên không bị crop)
  const PAD = 30, R = 22;
  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  nodes.forEach(n => {
    xMin = Math.min(xMin, n.__pos.x - R); xMax = Math.max(xMax, n.__pos.x + R);
    yMin = Math.min(yMin, n.__pos.y - R); yMax = Math.max(yMax, n.__pos.y + R);
  });
  const vbX = xMin - PAD, vbY = yMin - PAD;
  const vbW = (xMax - xMin) + PAD * 2, vbH = (yMax - yMin) + PAD * 2;
  svg.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
  edges.forEach(([a, b]) => {
    svg.insertAdjacentHTML('beforeend',
      `<line class="edge" x1="${a.__pos.x}" y1="${a.__pos.y}" x2="${b.__pos.x}" y2="${b.__pos.y}"/>`);
  });
  nodes.forEach(n => {
    const k = highlight[n.v] || '';
    svg.insertAdjacentHTML('beforeend',
      `<circle class="node-c ${k}" cx="${n.__pos.x}" cy="${n.__pos.y}" r="${R}"/>
       <text x="${n.__pos.x}" y="${n.__pos.y}">${n.v}</text>`);
  });
}
const PSEUDO = {
  insert: ['function insert(node, key):', '    if node == null: return new Node(key)', '    if key < node.value: node.left  = insert(node.left, key)', '    else if key > node.value: node.right = insert(node.right, key)', '    return node'],
  search: ['function search(node, key):', '    if node == null: return null', '    if key == node.value: return node', '    if key < node.value: return search(node.left, key)', '    else:                return search(node.right, key)'],
  delete: ['function delete(node, key):', '    if node == null: return null', '    if key < node.value:  node.left  = delete(node.left, key)', '    else if key > node.value: node.right = delete(node.right, key)', '    else:', '        if node.left == null:  return node.right', '        if node.right == null: return node.left', '        succ = minNode(node.right)', '        node.value = succ.value', '        node.right = delete(node.right, succ.value)', '    return node']
};
function renderPseudo(mode, hitLine = -1) {
  const lines = PSEUDO[mode] || [];
  document.getElementById('pseudo').innerHTML = lines.map((l, i) => {
    const esc = l.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return `<span class="ln${i === hitLine ? ' hit' : ''}">${esc}</span>`;
  }).join('');
}
function treeHeight(n) { if (!n) return -1; return 1 + Math.max(treeHeight(n.l), treeHeight(n.r)); }
function treeSize(n) { if (!n) return 0; return 1 + treeSize(n.l) + treeSize(n.r); }
function updateStats() {
  const n = treeSize(root), h = treeHeight(root);
  document.getElementById('stats').textContent =
    `n=${n} · chiều cao=${h} · ${n > 0 ? `tối ưu (cân bằng) = ⌈log₂(${n+1})⌉ = ${Math.ceil(Math.log2(n+1))}` : ''}` +
    (n > 0 && h >= n - 1 ? ' · ⚠ cây bị suy biến!' : '');
}
function doInsert() {
  const v = parseInt(document.getElementById('v').value);
  root = ins(root, v);
  render({ [v]: 'hit' });
  renderPseudo('insert');
  updateStats();
  document.getElementById('log').textContent = `Insert ${v} — đi xuống tới chỗ null rồi gắn vào.`;
}
function delNode(n, v, log) {
  if (!n) return null;
  if (v < n.v) { n.l = delNode(n.l, v, log); return n; }
  if (v > n.v) { n.r = delNode(n.r, v, log); return n; }
  // found
  if (!n.l) { log.push(`Node ${v}: không có con trái → nâng con phải lên thay.`); return n.r; }
  if (!n.r) { log.push(`Node ${v}: không có con phải → nâng con trái lên thay.`); return n.l; }
  // 2 children: find in-order successor
  let s = n.r;
  while (s.l) s = s.l;
  log.push(`Node ${v}: có 2 con → tìm in-order successor = ${s.v} (min của subtree phải), gán giá trị, xóa successor.`);
  n.v = s.v;
  n.r = delNode(n.r, s.v, log);
  return n;
}
function doDelete() {
  const v = parseInt(document.getElementById('v').value);
  const log = [];
  root = delNode(root, v, log);
  render();
  renderPseudo('delete');
  updateStats();
  document.getElementById('log').textContent = log.length ? log.join(' | ') : `Không có ${v} trong cây.`;
}
function loadPreset() {
  const k = document.getElementById('preset').value;
  root = null;
  const presets = {
    empty: [], demo: [50,30,70,20,40,60,80,35], bai1: [5,3,8,1,4,7,9], bad: [1,2,3,4,5,6,7]
  };
  for (const x of presets[k]) root = ins(root, x);
  render();
  updateStats();
  document.getElementById('log').textContent = k === 'bad'
    ? 'Dãy 1..7 đã sắp xếp → cây suy biến thành linked list, chiều cao = n-1 (bài 5 README).'
    : k === 'bai1' ? 'Đã chèn 5,3,8,1,4,7,9 đúng theo bài 1 README.'
    : '';
}
async function doSearch() {
  const v = parseInt(document.getElementById('v').value);
  const gen = search(root, v, []);
  renderPseudo('search');
  let last;
  for (const step of gen) {
    if (step.done) {
      last = step;
      const hl = {};
      step.path.forEach(n => hl[n.v] = 'path');
      if (step.found && step.path.length) hl[step.path[step.path.length-1].v] = 'hit';
      render(hl);
      document.getElementById('log').textContent = step.found
        ? `Tìm thấy ${v} sau ${step.path.length} bước (chiều cao đi qua).`
        : `Không tìm thấy ${v}. Đã đi ${step.path.length} bước.`;
      return;
    }
    const hl = {};
    step.path.forEach(n => hl[n.v] = 'path');
    render(hl);
    await sleep(500);
  }
}
function reset() { root = null; render(); document.getElementById('log').textContent = ''; updateStats(); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Khởi tạo demo
[50, 30, 70, 20, 40, 60, 80, 35].forEach(x => root = ins(root, x));
render();
updateStats();
</script></main>

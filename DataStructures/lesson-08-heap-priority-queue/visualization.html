<main>

<h1>Min-Heap — biểu diễn mảng + cây</h1>

<div class="panel">
  <label>Giá trị: <input id="val" type="number" value="5"></label>
  <button onclick="doInsert()">Insert (sift up)</button>
  <button onclick="doExtract()">Extract Min (sift down)</button>
  <button onclick="reset()">Reset</button>
  <h2>Cây (cha-con)</h2>
  <svg id="svg" width="760" height="320"></svg>
  <h2>Mảng cùng dữ liệu</h2>
  <div class="array" id="arr"></div>
  <div class="log" id="log">Min-heap: mỗi node ≤ con. Cha của i là (i-1)/2; con 2i+1 và 2i+2.</div>
</div>

<script>
let heap = [1, 3, 2, 7, 5, 4, 8];
let hl = {}; // index -> 'current'/'swap'/'new'

function renderArray() {
  const root = document.getElementById('arr');
  root.innerHTML = '';
  heap.forEach((v, i) => {
    const c = document.createElement('div');
    c.className = 'cell ' + (hl[i] || '');
    c.innerHTML = `<span class="idx">${i}</span>${v}`;
    root.appendChild(c);
  });
}

function renderTree() {
  const svg = document.getElementById('svg');
  svg.innerHTML = '';
  const n = heap.length;
  if (!n) return;
  // layout: BFS, mỗi tầng chia đều ngang
  const positions = [];
  const depth = Math.floor(Math.log2(n)) + 1;
  for (let i = 0; i < n; i++) {
    const d = Math.floor(Math.log2(i + 1));
    const idxInLevel = i - ((1 << d) - 1);
    const levelCount = 1 << d;
    const x = (idxInLevel + 0.5) * (760 / levelCount);
    const y = 40 + d * 80;
    positions[i] = { x, y };
  }
  // edges first
  for (let i = 1; i < n; i++) {
    const p = positions[(i - 1) >> 1];
    const c = positions[i];
    svg.insertAdjacentHTML('beforeend', `<line class="edge" x1="${p.x}" y1="${p.y}" x2="${c.x}" y2="${c.y}"/>`);
  }
  // nodes
  for (let i = 0; i < n; i++) {
    const k = hl[i] || '';
    const { x, y } = positions[i];
    svg.insertAdjacentHTML('beforeend',
      `<circle class="node-c ${k}" cx="${x}" cy="${y}" r="20"/>
       <text x="${x}" y="${y}">${heap[i]}</text>`);
  }
}

function render() { renderArray(); renderTree(); }

async function doInsert() {
  const v = parseInt(document.getElementById('val').value);
  heap.push(v);
  let i = heap.length - 1;
  hl = { [i]: 'new' };
  render();
  log(`Thêm ${v} vào cuối (index ${i}), giờ sift up.`);
  await sleep(700);
  while (i > 0) {
    const p = (i - 1) >> 1;
    hl = { [i]: 'current', [p]: 'current' };
    render();
    await sleep(500);
    if (heap[p] <= heap[i]) {
      log(`heap[${p}]=${heap[p]} ≤ heap[${i}]=${heap[i]} → dừng.`);
      break;
    }
    hl = { [i]: 'swap', [p]: 'swap' };
    log(`heap[${p}]=${heap[p]} > heap[${i}]=${heap[i]} → đổi chỗ.`);
    [heap[i], heap[p]] = [heap[p], heap[i]];
    render();
    await sleep(500);
    i = p;
  }
  hl = {};
  render();
}

async function doExtract() {
  if (!heap.length) return;
  const min = heap[0];
  hl = { 0: 'removed' };
  render();
  log(`extractMin() = ${min}. Lấy phần tử cuối lên gốc rồi sift down.`);
  await sleep(700);
  heap[0] = heap[heap.length - 1];
  heap.pop();
  hl = { 0: 'new' };
  render();
  await sleep(500);
  let i = 0;
  while (true) {
    const l = 2 * i + 1, r = 2 * i + 2;
    let smallest = i;
    if (l < heap.length && heap[l] < heap[smallest]) smallest = l;
    if (r < heap.length && heap[r] < heap[smallest]) smallest = r;
    hl = { [i]: 'current' };
    if (l < heap.length) hl[l] = 'current';
    if (r < heap.length) hl[r] = 'current';
    render();
    await sleep(500);
    if (smallest === i) {
      log('Vị trí hiện tại nhỏ hơn cả 2 con (hoặc lá) → dừng.');
      break;
    }
    hl = { [i]: 'swap', [smallest]: 'swap' };
    log(`heap[${i}]=${heap[i]} > min(con) = heap[${smallest}]=${heap[smallest]} → đổi.`);
    [heap[i], heap[smallest]] = [heap[smallest], heap[i]];
    render();
    await sleep(500);
    i = smallest;
  }
  hl = {};
  render();
}

function reset() { heap = [1, 3, 2, 7, 5, 4, 8]; hl = {}; render(); log('Reset.'); }
function log(m) { document.getElementById('log').textContent = m; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
render();
</script>

<script>
function openReadme() {
  document.getElementById('readmeBackdrop').classList.add('open');
  const el = document.getElementById('readmeContent');
  if (el.dataset.loaded === '1') return;
  fetch('./README.md').then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(md => {
      el.innerHTML = (typeof marked !== 'undefined' && marked.parse)
        ? marked.parse(md) : '<pre>' + md.replace(/</g, '&lt;') + '</pre>';
      el.dataset.loaded = '1';
    })
    .catch(() => {
      el.innerHTML =
        '<div class="fallback"><strong>Không tải được README qua <code>file://</code></strong> ' +
        '(trình duyệt chặn <code>fetch</code> cho local file).<br><br>' +
        'Cách khắc phục:<br>' +
        '· Mở trực tiếp file: <a href="./README.md" target="_blank">README.md</a><br>' +
        '· Hoặc chạy web server đơn giản trong thư mục lĩnh vực:<br>' +
        '<pre>cd DataStructures &amp;&amp; python3 -m http.server 8000</pre>' +
        'rồi mở <a href="http://localhost:8000/">http://localhost:8000/</a></div>';
    });
}
function closeReadme() { document.getElementById('readmeBackdrop').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReadme(); });
</script>

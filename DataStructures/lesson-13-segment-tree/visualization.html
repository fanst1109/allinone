<h1>Segment Tree — Range Sum Query</h1>

<div class="panel">
  <div class="row">
    L = <input id="ql" type="number" value="2" min="0" max="7">
    R = <input id="qr" type="number" value="5" min="0" max="7">
    <button onclick="doQuery()">Query Sum [L..R]</button>
    <button onclick="doUpdate()">Update arr[L] += R (giá trị)</button>
    <button onclick="reset()">Reset</button>
  </div>
  <div>Mảng gốc:</div>
  <div class="array" id="arrDiv"></div>
  <svg id="svg" width="980" height="320"></svg>
  <div class="log" id="log">Node xanh: bị duyệt qua. Node xanh đậm: nằm trọn trong khoảng truy vấn, lấy giá trị trực tiếp.</div>
</div>

<script>
let arr = [1, 3, 5, 7, 9, 11, 13, 15];
const N = arr.length;
let tree = new Array(4 * N).fill(0);
let visited = new Set(), taken = new Set();

function build(node, l, r) {
  if (l === r) { tree[node] = arr[l]; return; }
  const m = (l + r) >> 1;
  build(2 * node, l, m); build(2 * node + 1, m + 1, r);
  tree[node] = tree[2 * node] + tree[2 * node + 1];
}
build(1, 0, N - 1);

function querySum(node, l, r, ql, qr) {
  if (qr < l || r < ql) return 0;
  visited.add(node);
  if (ql <= l && r <= qr) { taken.add(node); return tree[node]; }
  const m = (l + r) >> 1;
  return querySum(2 * node, l, m, ql, qr) + querySum(2 * node + 1, m + 1, r, ql, qr);
}

function pointUpdate(node, l, r, i, delta) {
  visited.add(node);
  if (l === r) { tree[node] += delta; return; }
  const m = (l + r) >> 1;
  if (i <= m) pointUpdate(2 * node, l, m, i, delta);
  else pointUpdate(2 * node + 1, m + 1, r, i, delta);
  tree[node] = tree[2 * node] + tree[2 * node + 1];
}

function layoutNode(node, l, r, x, y, dx, list, edges) {
  list.push({ node, l, r, x, y });
  if (l === r) return;
  const m = (l + r) >> 1;
  const lcX = x - dx, rcX = x + dx, cy = y + 70;
  edges.push([x, y, lcX, cy]); edges.push([x, y, rcX, cy]);
  layoutNode(2 * node, l, m, lcX, cy, Math.max(dx / 1.8, 30), list, edges);
  layoutNode(2 * node + 1, m + 1, r, rcX, cy, Math.max(dx / 1.8, 30), list, edges);
}

function render(qRange = null) {
  // array
  const arrDiv = document.getElementById('arrDiv');
  arrDiv.innerHTML = '';
  arr.forEach((v, i) => {
    const inR = qRange && i >= qRange.l && i <= qRange.r;
    const c = document.createElement('div');
    c.className = 'cell' + (inR ? ' in-range' : '');
    c.innerHTML = `<span class="idx">${i}</span>${v}`;
    arrDiv.appendChild(c);
  });
  // tree
  const svg = document.getElementById('svg');
  svg.innerHTML = '';
  const list = [], edges = [];
  layoutNode(1, 0, N - 1, 490, 30, 220, list, edges);
  edges.forEach(([x1, y1, x2, y2]) => svg.insertAdjacentHTML('beforeend', `<line class="edge" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`));
  list.forEach(({ node, l, r, x, y }) => {
    let cls = '';
    if (taken.has(node)) cls = 'taken';
    else if (visited.has(node)) cls = 'visited';
    else if (qRange && (r < qRange.l || l > qRange.r)) cls = 'outside';
    svg.insertAdjacentHTML('beforeend',
      `<rect class="node-r ${cls}" x="${x - 26}" y="${y - 17}" width="52" height="34" rx="6"/>
       <text x="${x}" y="${y - 4}">${tree[node]}</text>
       <text class="range" x="${x}" y="${y + 9}">[${l},${r}]</text>`);
  });
}

function doQuery() {
  const l = parseInt(document.getElementById('ql').value);
  const r = parseInt(document.getElementById('qr').value);
  if (l > r || l < 0 || r >= N) { log('L/R không hợp lệ'); return; }
  visited = new Set(); taken = new Set();
  const sum = querySum(1, 0, N - 1, l, r);
  log(`Sum [${l}..${r}] = ${sum}. Đã duyệt ${visited.size} node trong tổng (so với ${r - l + 1} phần tử).`);
  render({ l, r });
}

function doUpdate() {
  const i = parseInt(document.getElementById('ql').value);
  const delta = parseInt(document.getElementById('qr').value);
  visited = new Set(); taken = new Set();
  arr[i] += delta;
  pointUpdate(1, 0, N - 1, i, delta);
  log(`Update arr[${i}] += ${delta} (giá trị mới = ${arr[i]}). Đi xuống lá theo đường ${visited.size} node, cập nhật lên gốc.`);
  render({ l: i, r: i });
}

function reset() {
  arr = [1, 3, 5, 7, 9, 11, 13, 15];
  tree = new Array(4 * N).fill(0);
  build(1, 0, N - 1);
  visited = new Set(); taken = new Set();
  render();
  log('Reset.');
}
function log(m) { document.getElementById('log').textContent = m; }
render();
</script>

<script>
function openReadme() {
  document.getElementById('readmeBackdrop').classList.add('open');
  const el = document.getElementById('readmeContent');
  if (el.dataset.loaded === '1') return;
  fetch('./README.md').then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(md => {
      el.innerHTML = (typeof marked !== 'undefined' && marked.parse)
        ? marked.parse(md) : '<pre>' + md.replace(/</g, '&lt;') + '</pre>';
      el.dataset.loaded = '1';
    })
    .catch(() => {
      el.innerHTML =
        '<div class="fallback"><strong>Không tải được README qua <code>file://</code></strong> ' +
        '(trình duyệt chặn <code>fetch</code> cho local file).<br><br>' +
        'Cách khắc phục:<br>' +
        '· Mở trực tiếp file: <a href="./README.md" target="_blank">README.md</a><br>' +
        '· Hoặc chạy web server đơn giản trong thư mục lĩnh vực:<br>' +
        '<pre>cd DataStructures &amp;&amp; python3 -m http.server 8000</pre>' +
        'rồi mở <a href="http://localhost:8000/">http://localhost:8000/</a></div>';
    });
}
function closeReadme() { document.getElementById('readmeBackdrop').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReadme(); });
</script>

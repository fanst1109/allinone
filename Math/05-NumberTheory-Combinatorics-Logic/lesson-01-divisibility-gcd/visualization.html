<h1>Lesson 01 (T5) — Thuật toán Euclid tìm GCD</h1>

<h2>GCD + Bezout (Euclid mở rộng)</h2>
<div class="card">
  <div class="row">
    <strong>a:</strong> <input type="number" id="a" value="252" oninput="calc()">
    <strong>b:</strong> <input type="number" id="b" value="105" oninput="calc()">
  </div>
  <div class="result" id="res"></div>
  <div id="steps"></div>
</div>

<script>
function calc() {
  let a = parseInt(document.getElementById("a").value);
  let b = parseInt(document.getElementById("b").value);
  if (!a || !b || a <= 0 || b <= 0) {
    document.getElementById("res").innerHTML = "<strong>Nhập a, b dương.</strong>";
    document.getElementById("steps").innerHTML = "";
    return;
  }
  const a0 = a, b0 = b;

  // Run Euclidean Algorithm
  const steps = [];
  let oldR = a, r = b, oldS = 1, s = 0, oldT = 0, t = 1;
  while (r !== 0) {
    const q = Math.floor(oldR / r);
    const rem = oldR - q * r;
    steps.push({oldR, r, q, rem, oldS, s, oldT, t});
    [oldR, r] = [r, rem];
    [oldS, s] = [s, oldS - q*s];
    [oldT, t] = [t, oldT - q*t];
  }
  const gcd = oldR;
  const x = oldS, y = oldT;
  const lcm = (a0 * b0) / gcd;

  // Render steps
  let html = "<h3>Bước Euclid:</h3><table><thead><tr><th>Bước</th><th>Phép chia</th><th>Thương q</th><th>Số dư r</th></tr></thead><tbody>";
  steps.forEach((s, i) => {
    html += `<tr><td>${i+1}</td><td>${s.oldR} = ${s.r}·${s.q} + ${s.rem}</td><td>${s.q}</td><td>${s.rem}</td></tr>`;
  });
  html += "</tbody></table>";

  // Show Bezout backward
  html += "<h3>Bezout (lùi ngược):</h3><div style='font-family:monospace; font-size:13px'>";
  html += `Cuối Euclid: gcd = ${gcd}.<br>`;
  html += `Lùi từng bước, ta được: <strong>${a0}·(${x}) + ${b0}·(${y}) = ${gcd}</strong>.<br>`;
  html += `Kiểm tra: ${a0}·${x} + ${b0}·${y} = ${a0*x} + ${b0*y} = ${a0*x + b0*y} ${a0*x + b0*y === gcd ? "✓" : "✗"}`;
  html += "</div>";

  document.getElementById("steps").innerHTML = html;

  document.getElementById("res").innerHTML = `
    <div style="font-family:monospace; font-size:15px"><strong>gcd(${a0}, ${b0}) = ${gcd}</strong></div>
    <div style="font-family:monospace; font-size:14px; margin-top:4px">LCM(${a0}, ${b0}) = a·b/gcd = ${a0*b0}/${gcd} = <strong>${lcm}</strong></div>
    <div style="font-family:monospace; font-size:14px; margin-top:4px">Bezout: <strong>${a0}·(${x}) + ${b0}·(${y}) = ${gcd}</strong></div>
    <div style="margin-top:6px; font-size:13px">Số bước Euclid: <strong>${steps.length}</strong> (rất nhanh — O(log min(a,b)))</div>
  `;
}

calc();
</script>

<h1>Lesson 02 (T6) — Định thức &amp; Giải hệ tuyến tính (Cramer)</h1>

<h2>Giải hệ 2×2: ax + by = e, cx + dy = f</h2>
<div class="card">
  <div class="row">
    <input type="number" id="a" value="2" oninput="solve()">x +
    <input type="number" id="b" value="1" oninput="solve()">y =
    <input type="number" id="e" value="5" oninput="solve()">
  </div>
  <div class="row">
    <input type="number" id="c" value="1" oninput="solve()">x +
    <input type="number" id="d" value="3" oninput="solve()">y =
    <input type="number" id="f" value="10" oninput="solve()">
  </div>
  <div class="result" id="res"></div>
</div>

<h2>Giải hệ 3×3</h2>
<div class="card">
  <p>Hệ 3 PT 3 ẩn (giải bằng Cramer hoặc Gauss).</p>
  <div class="row">
    <input type="number" id="m11" value="2" oninput="solve3()">x +
    <input type="number" id="m12" value="1" oninput="solve3()">y +
    <input type="number" id="m13" value="1" oninput="solve3()">z =
    <input type="number" id="rhs1" value="5" oninput="solve3()">
  </div>
  <div class="row">
    <input type="number" id="m21" value="1" oninput="solve3()">x +
    <input type="number" id="m22" value="3" oninput="solve3()">y +
    <input type="number" id="m23" value="2" oninput="solve3()">z =
    <input type="number" id="rhs2" value="11" oninput="solve3()">
  </div>
  <div class="row">
    <input type="number" id="m31" value="3" oninput="solve3()">x +
    <input type="number" id="m32" value="1" oninput="solve3()">y +
    <input type="number" id="m33" value="4" oninput="solve3()">z =
    <input type="number" id="rhs3" value="12" oninput="solve3()">
  </div>
  <div class="result" id="res3"></div>
</div>

<script>
function solve() {
  const a = +document.getElementById("a").value;
  const b = +document.getElementById("b").value;
  const c = +document.getElementById("c").value;
  const d = +document.getElementById("d").value;
  const e = +document.getElementById("e").value;
  const f = +document.getElementById("f").value;
  const det = a*d - b*c;
  if (Math.abs(det) < 1e-9) {
    document.getElementById("res").innerHTML = `<div style="font-family:monospace; font-size:14px"><strong>det = 0 → hệ vô nghiệm hoặc vô số nghiệm.</strong></div>`;
    return;
  }
  const det1 = e*d - b*f;
  const det2 = a*f - e*c;
  const x = det1 / det;
  const y = det2 / det;
  document.getElementById("res").innerHTML = `
    <div style="font-family:monospace; font-size:14px">det(A) = ${a}·${d} − ${b}·${c} = <strong>${det}</strong></div>
    <div style="font-family:monospace; font-size:14px">det(A₁) = ${e}·${d} − ${b}·${f} = <strong>${det1}</strong></div>
    <div style="font-family:monospace; font-size:14px">det(A₂) = ${a}·${f} − ${e}·${c} = <strong>${det2}</strong></div>
    <div style="font-family:monospace; font-size:15px; margin-top:6px">
      <strong>x = ${det1}/${det} = ${x.toFixed(4)}, y = ${det2}/${det} = ${y.toFixed(4)}</strong>
    </div>
  `;
}

function det3(m) {
  return m[0][0]*(m[1][1]*m[2][2] - m[1][2]*m[2][1]) - m[0][1]*(m[1][0]*m[2][2] - m[1][2]*m[2][0]) + m[0][2]*(m[1][0]*m[2][1] - m[1][1]*m[2][0]);
}

function solve3() {
  const m = [
    [+document.getElementById("m11").value, +document.getElementById("m12").value, +document.getElementById("m13").value],
    [+document.getElementById("m21").value, +document.getElementById("m22").value, +document.getElementById("m23").value],
    [+document.getElementById("m31").value, +document.getElementById("m32").value, +document.getElementById("m33").value]
  ];
  const b = [+document.getElementById("rhs1").value, +document.getElementById("rhs2").value, +document.getElementById("rhs3").value];
  const D = det3(m);
  if (Math.abs(D) < 1e-9) {
    document.getElementById("res3").innerHTML = `<div style="font-family:monospace; font-size:14px"><strong>det = 0 → vô nghiệm hoặc vô số nghiệm.</strong></div>`;
    return;
  }
  const replace = (col) => m.map((row, i) => row.map((v, j) => j === col ? b[i] : v));
  const D1 = det3(replace(0)), D2 = det3(replace(1)), D3 = det3(replace(2));
  const x = D1/D, y = D2/D, z = D3/D;
  document.getElementById("res3").innerHTML = `
    <div style="font-family:monospace; font-size:14px">det(A) = <strong>${D.toFixed(4)}</strong></div>
    <div style="font-family:monospace; font-size:14px">det(A₁) = ${D1.toFixed(4)}, det(A₂) = ${D2.toFixed(4)}, det(A₃) = ${D3.toFixed(4)}</div>
    <div style="font-family:monospace; font-size:15px; margin-top:6px"><strong>x = ${x.toFixed(4)}, y = ${y.toFixed(4)}, z = ${z.toFixed(4)}</strong></div>
  `;
}

solve();
solve3();
</script>

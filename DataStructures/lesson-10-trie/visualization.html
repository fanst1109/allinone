<style>
  .panel { background: #fff; border-radius: 8px; padding: 16px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 16px; }
  h1 { margin: 0 0 8px 0; } h2 { margin: 4px 0 8px 0; }
  svg { background: #fafafa; border: 1px solid #eee; border-radius: 6px; display: block; width: 100%; max-width: 1000px; }
  .node-c { fill: #fff; stroke: #888; stroke-width: 2; transition: all .3s; }
  .node-c.isEnd { fill: #fef9c3; stroke: #ca8a04; }
  .node-c.path { stroke: #10b981; stroke-width: 3; }
  .node-c.found { fill: #d1fae5; stroke: #10b981; stroke-width: 3; }
  .edge { stroke: #aaa; stroke-width: 1.5; }
  .edge.path { stroke: #10b981; stroke-width: 3; }
  .edge-label { font: 600 12px sans-serif; fill: #555; }
  text.node-label { font: 600 11px sans-serif; text-anchor: middle; dominant-baseline: central; fill: #333; }
  button { background: #3b82f6; color: #fff; border: 0; padding: 8px 14px; border-radius: 6px; cursor: pointer; margin-right: 6px; }
  input { padding: 4px; width: 120px; }
  .log { color: #444; min-height: 22px; margin-top: 8px; font-family: monospace; font-size: 13px; }
  .auto-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .auto-list .word { background: #d1fae5; border: 1px solid #10b981; color: #065f46; padding: 4px 10px; border-radius: 14px; font-family: monospace; font-weight: 600; }
  button.danger { background: #ef4444; }
  button.green { background: #10b981; }
</style>

<body>

<main>

<h1>Trie — Cây tiền tố</h1>

<div class="panel">
  <label>Từ: <input id="word" type="text" value="cart"></label>
  <button onclick="doInsert()">Insert</button>
  <button onclick="doSearch()">Search</button>
  <button onclick="doStartsWith()">StartsWith</button>
  <button class="green" onclick="doAutocomplete()">▶ Autocomplete (bài 3)</button>
  <button class="danger" onclick="doDelete()">Delete word (bài 4)</button>
  <button onclick="reset()">Reset</button>
  <svg id="svg" width="1000" height="380"></svg>
  <div>Gợi ý từ tìm được: <div class="auto-list" id="autoList"></div></div>
  <div class="log" id="log">Node vàng = kết thúc một từ. Đường xanh = đường đi của truy vấn.</div>
</div>

<script>
let root = newNode();
function newNode() { return { children: {}, isEnd: false }; }

function insert(w) {
  let cur = root;
  for (const c of w) {
    if (!cur.children[c]) cur.children[c] = newNode();
    cur = cur.children[c];
  }
  cur.isEnd = true;
}

// Khởi tạo demo
['cat', 'car', 'cart', 'cup', 'cope', 'code', 'coder', 'dog'].forEach(insert);

function layout(node, x, y, dx, list, edges, edgeLabels, key = '') {
  node.__pos = { x, y };
  node.__key = key;
  list.push(node);
  const childKeys = Object.keys(node.children).sort();
  const n = childKeys.length;
  let startX = x - ((n - 1) * dx) / 2;
  childKeys.forEach((ch, i) => {
    const c = node.children[ch];
    const cx = startX + i * dx, cy = y + 70;
    edges.push([{ x, y }, { x: cx, y: cy }, false]);
    edgeLabels.push({ x: (x + cx) / 2, y: (y + cy) / 2 - 6, label: ch });
    layout(c, cx, cy, Math.max(dx / Math.max(n, 1.5), 30), list, edges, edgeLabels, ch);
  });
}

function render(highlightPath = []) {
  const svg = document.getElementById('svg');
  svg.innerHTML = '';
  const list = [], edges = [], labels = [];
  layout(root, 500, 30, 220, list, edges, labels);
  // Build set of edges in path
  const pathSet = new Set();
  for (let i = 0; i < highlightPath.length - 1; i++) {
    pathSet.add(highlightPath[i].__pos.x + '-' + highlightPath[i].__pos.y + '-' +
                highlightPath[i + 1].__pos.x + '-' + highlightPath[i + 1].__pos.y);
  }
  edges.forEach(([a, b]) => {
    const key = a.x + '-' + a.y + '-' + b.x + '-' + b.y;
    const cls = pathSet.has(key) ? 'edge path' : 'edge';
    svg.insertAdjacentHTML('beforeend', `<line class="${cls}" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"/>`);
  });
  labels.forEach(l => {
    svg.insertAdjacentHTML('beforeend', `<text class="edge-label" x="${l.x}" y="${l.y}">${l.label}</text>`);
  });
  const lastInPath = highlightPath[highlightPath.length - 1];
  list.forEach(n => {
    const inPath = highlightPath.includes(n);
    let cls = '';
    if (inPath && n === lastInPath) cls = n.isEnd ? 'found isEnd' : 'found';
    else if (inPath) cls = 'path' + (n.isEnd ? ' isEnd' : '');
    else if (n.isEnd) cls = 'isEnd';
    svg.insertAdjacentHTML('beforeend',
      `<circle class="node-c ${cls}" cx="${n.__pos.x}" cy="${n.__pos.y}" r="14"/>`);
    if (n === root) {
      svg.insertAdjacentHTML('beforeend',
        `<text class="node-label" x="${n.__pos.x}" y="${n.__pos.y}">·</text>`);
    }
  });
}

async function doInsert() {
  const w = document.getElementById('word').value.toLowerCase();
  if (!w) return;
  insert(w);
  log(`Insert "${w}". Đã tạo các node theo từng ký tự. Cuối từ đánh dấu isEnd = true.`);
  render();
}

async function doSearch() {
  const w = document.getElementById('word').value.toLowerCase();
  if (!w) return;
  let cur = root;
  const path = [root];
  for (const c of w) {
    if (!cur.children[c]) {
      log(`Tìm "${w}": không có ký tự '${c}' tại bước này → KHÔNG có.`);
      render(path);
      return;
    }
    cur = cur.children[c];
    path.push(cur);
    render(path);
    await sleep(400);
  }
  log(`Tìm "${w}": đi tới node cuối, isEnd = ${cur.isEnd}. → ${cur.isEnd ? 'CÓ' : 'KHÔNG (chỉ là prefix)'}`);
  render(path);
}

async function doStartsWith() {
  const w = document.getElementById('word').value.toLowerCase();
  if (!w) return;
  let cur = root;
  const path = [root];
  for (const c of w) {
    if (!cur.children[c]) {
      log(`StartsWith "${w}": dừng ở '${c}' → không có từ nào bắt đầu bằng prefix này.`);
      render(path);
      return;
    }
    cur = cur.children[c];
    path.push(cur);
    render(path);
    await sleep(400);
  }
  log(`StartsWith "${w}": đến được node cuối → CÓ ít nhất một từ bắt đầu bằng prefix.`);
  render(path);
}

function reset() {
  root = newNode();
  ['cat', 'car', 'cart', 'cup', 'cope', 'code', 'coder', 'dog'].forEach(insert);
  document.getElementById('autoList').innerHTML = '';
  render(); log('Reset về 8 từ của README: cat, car, cart, cup, cope, code, coder, dog.');
}

async function doAutocomplete() {
  const w = document.getElementById('word').value.toLowerCase();
  if (!w) return;
  let cur = root;
  const path = [root];
  for (const c of w) {
    if (!cur.children[c]) {
      log(`Autocomplete "${w}": dừng ở '${c}' → không có từ nào bắt đầu bằng prefix này.`);
      render(path);
      document.getElementById('autoList').innerHTML = '';
      return;
    }
    cur = cur.children[c];
    path.push(cur);
    render(path);
    await sleep(250);
  }
  // DFS from cur, collect all words
  const found = [];
  function dfs(n, acc) {
    if (n.isEnd) found.push(acc);
    for (const ch of Object.keys(n.children).sort()) dfs(n.children[ch], acc + ch);
  }
  dfs(cur, w);
  log(`Autocomplete "${w}": tìm thấy ${found.length} từ — DFS từ node prefix gom mọi node isEnd.`);
  document.getElementById('autoList').innerHTML = found.map(f => `<span class="word">${f}</span>`).join('');
  render(path);
}

function doDelete() {
  const w = document.getElementById('word').value.toLowerCase();
  if (!w) { log('Cần nhập từ.'); return; }
  // Verify exists
  let cur = root;
  const stack = [{ node: root, ch: null }];
  for (const c of w) {
    if (!cur.children[c]) { log(`"${w}" không có trong trie.`); return; }
    cur = cur.children[c];
    stack.push({ node: cur, ch: c });
  }
  if (!cur.isEnd) { log(`"${w}" chỉ là prefix, không phải từ → không xóa.`); return; }
  cur.isEnd = false;
  // Prune empty branches từ dưới lên
  let pruned = 0;
  for (let i = stack.length - 1; i > 0; i--) {
    const { node, ch } = stack[i];
    if (node.isEnd || Object.keys(node.children).length > 0) break;
    delete stack[i - 1].node.children[ch];
    pruned++;
  }
  document.getElementById('autoList').innerHTML = '';
  render();
  log(`Đã xóa "${w}". isEnd về false. Cắt ${pruned} node lá rỗng (không là prefix của từ khác).`);
}
function log(m) { document.getElementById('log').textContent = m; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
render();
</script></main>

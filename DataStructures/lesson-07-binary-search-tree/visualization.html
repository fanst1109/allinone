<main>
<h1>Binary Search Tree</h1>

<div class="panel">
  <label>Giá trị: <input id="v" type="number" value="42"></label>
  <button onclick="doInsert()">Insert</button>
  <button onclick="doSearch()">Search</button>
  <button onclick="reset()">Reset</button>
  <button onclick="loadBad()">Nạp dãy lệch (1..7)</button>
  <svg id="svg" width="800" height="420"></svg>
  <div class="log" id="log"></div>
</div>

<script>
let root = null;
function ins(n, v) { if (!n) return {v, l: null, r: null}; if (v < n.v) n.l = ins(n.l, v); else if (v > n.v) n.r = ins(n.r, v); return n; }
function* search(n, v, path) {
  if (!n) { yield { done: true, found: false, path }; return; }
  path.push(n);
  yield { done: false, current: n, path: [...path] };
  if (v === n.v) { yield { done: true, found: true, path: [...path] }; return; }
  if (v < n.v) yield* search(n.l, v, path);
  else yield* search(n.r, v, path);
}
function layout(n, x, y, dx, nodes, edges) {
  if (!n) return;
  n.__pos = { x, y };
  nodes.push(n);
  if (n.l) { edges.push([n, n.l]); layout(n.l, x - dx, y + 70, dx / 1.7, nodes, edges); }
  if (n.r) { edges.push([n, n.r]); layout(n.r, x + dx, y + 70, dx / 1.7, nodes, edges); }
}
function render(highlight = {}) {
  const svg = document.getElementById('svg');
  svg.innerHTML = '';
  if (!root) return;
  const nodes = [], edges = [];
  layout(root, 400, 40, 180, nodes, edges);
  edges.forEach(([a, b]) => {
    svg.insertAdjacentHTML('beforeend',
      `<line class="edge" x1="${a.__pos.x}" y1="${a.__pos.y}" x2="${b.__pos.x}" y2="${b.__pos.y}"/>`);
  });
  nodes.forEach(n => {
    const k = highlight[n.v] || '';
    svg.insertAdjacentHTML('beforeend',
      `<circle class="node-c ${k}" cx="${n.__pos.x}" cy="${n.__pos.y}" r="22"/>
       <text x="${n.__pos.x}" y="${n.__pos.y}">${n.v}</text>`);
  });
}
function doInsert() {
  const v = parseInt(document.getElementById('v').value);
  root = ins(root, v);
  render({ [v]: 'hit' });
  document.getElementById('log').textContent = `Insert ${v} — đi xuống tới chỗ null rồi gắn vào.`;
}
async function doSearch() {
  const v = parseInt(document.getElementById('v').value);
  const gen = search(root, v, []);
  let last;
  for (const step of gen) {
    if (step.done) {
      last = step;
      const hl = {};
      step.path.forEach(n => hl[n.v] = 'path');
      if (step.found && step.path.length) hl[step.path[step.path.length-1].v] = 'hit';
      render(hl);
      document.getElementById('log').textContent = step.found
        ? `Tìm thấy ${v} sau ${step.path.length} bước (chiều cao đi qua).`
        : `Không tìm thấy ${v}. Đã đi ${step.path.length} bước.`;
      return;
    }
    const hl = {};
    step.path.forEach(n => hl[n.v] = 'path');
    render(hl);
    await sleep(500);
  }
}
function reset() { root = null; render(); document.getElementById('log').textContent = ''; }
function loadBad() {
  root = null;
  for (let i = 1; i <= 7; i++) root = ins(root, i);
  render();
  document.getElementById('log').textContent = 'Chèn dãy 1..7 → cây bị lệch hoàn toàn (chiều cao = n-1).';
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Khởi tạo demo
[50, 30, 70, 20, 40, 60, 80, 35].forEach(x => root = ins(root, x));
render();
</script>
<div class="readme-backdrop" id="readmeBackdrop" onclick="if(event.target===this)closeReadme()">
  <div class="readme-modal">
    <button class="close" onclick="closeReadme()" aria-label="Đóng">×</button>
    <div class="content" id="readmeContent">Đang tải README…</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
function openReadme() {
  document.getElementById('readmeBackdrop').classList.add('open');
  const el = document.getElementById('readmeContent');
  if (el.dataset.loaded === '1') return;
  fetch('./README.md').then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(md => {
      el.innerHTML = (typeof marked !== 'undefined' && marked.parse)
        ? marked.parse(md) : '<pre>' + md.replace(/</g, '&lt;') + '</pre>';
      el.dataset.loaded = '1';
    })
    .catch(() => {
      el.innerHTML =
        '<div class="fallback"><strong>Không tải được README qua <code>file://</code></strong> ' +
        '(trình duyệt chặn <code>fetch</code> cho local file).<br><br>' +
        'Cách khắc phục:<br>' +
        '· Mở trực tiếp file: <a href="./README.md" target="_blank">README.md</a><br>' +
        '· Hoặc chạy web server đơn giản trong thư mục lĩnh vực:<br>' +
        '<pre>cd DataStructures &amp;&amp; python3 -m http.server 8000</pre>' +
        'rồi mở <a href="http://localhost:8000/">http://localhost:8000/</a></div>';
    });
}
function closeReadme() { document.getElementById('readmeBackdrop').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReadme(); });
</script>

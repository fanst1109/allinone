<h1>Lesson 08 (T5) — Phương pháp chứng minh</h1>

<h2>5 phương pháp chính</h2>
<div class="card">
  <div class="row">
    <button id="b1" onclick="setM('direct')" class="active">Trực tiếp</button>
    <button id="b2" onclick="setM('contrapositive')">Phản đảo</button>
    <button id="b3" onclick="setM('contradiction')">Phản chứng</button>
    <button id="b4" onclick="setM('construction')">Xây dựng</button>
    <button id="b5" onclick="setM('induction')">Quy nạp</button>
  </div>
  <div class="result" id="info"></div>
  <div class="proof" id="proof"></div>
</div>

<script>
const methods = {
  direct: {
    title: "Chứng minh trực tiếp",
    when: "Khi P → Q rõ ràng, suy luận thẳng được.",
    example: `Mệnh đề: "Nếu n chẵn thì n² chẵn".

Chứng minh:
  Giả sử n chẵn → ∃k: n = 2k.
  n² = (2k)² = 4k² = 2·(2k²).
  → n² chia hết 2 → chẵn. □`
  },
  contrapositive: {
    title: "Chứng minh phản đảo",
    when: "Khi ¬Q → ¬P dễ hơn P → Q. (P→Q tương đương ¬Q→¬P.)",
    example: `Mệnh đề: "Nếu n² lẻ thì n lẻ".

Chứng minh phản đảo:
  Cần CM: "Nếu n chẵn thì n² chẵn".
  (Đã CM ở trực tiếp.)
  → Phản đảo đúng → ban đầu đúng. □`
  },
  contradiction: {
    title: "Chứng minh phản chứng",
    when: "Khi mệnh đề là phủ định ('không phải', 'không tồn tại').",
    example: `Mệnh đề: "√2 không phải số hữu tỉ".

Chứng minh phản chứng:
  Giả sử √2 = a/b với gcd(a, b) = 1.
  → 2 = a²/b² → a² = 2b² → a chẵn → a = 2c.
  → 4c² = 2b² → b² = 2c² → b chẵn.
  → 2 | gcd(a, b), MÂU THUẪN.
  Vậy √2 vô tỉ. □`
  },
  construction: {
    title: "Chứng minh xây dựng",
    when: "Khi cần CM ∃x: P(x). Tìm x cụ thể.",
    example: `Mệnh đề: "Tồn tại n để 7^n - 1 chia hết cho 6".

Chứng minh xây dựng:
  Lấy n = 1: 7 - 1 = 6. ✓
  → Tồn tại. □

(Thực ra mọi n đều thoả vì 7 ≡ 1 mod 6.)`
  },
  induction: {
    title: "Chứng minh quy nạp",
    when: "Khi cần CM P(n) đúng ∀n ∈ ℕ.",
    example: `Mệnh đề: "1 + 2 + ... + n = n(n+1)/2 ∀n ≥ 1".

Chứng minh quy nạp:
  Cơ sở (n=1): VT = 1, VP = 1·2/2 = 1. ✓

  Bước (giả sử P(k) đúng, CM P(k+1)):
    1+2+...+k + (k+1)
    = k(k+1)/2 + (k+1)        (giả thuyết)
    = (k+1)[k/2 + 1]
    = (k+1)(k+2)/2 ✓

  Vậy P(n) đúng ∀n ≥ 1. □`
  }
};
let cur = "direct";

function setM(m) {
  cur = m;
  ["1","2","3","4","5"].forEach(c => document.getElementById("b"+c).classList.remove("active"));
  const map = {direct:"1", contrapositive:"2", contradiction:"3", construction:"4", induction:"5"};
  document.getElementById("b" + map[m]).classList.add("active");
  draw();
}

function draw() {
  const x = methods[cur];
  document.getElementById("info").innerHTML = `
    <div style="font-family:monospace; font-size:16px"><strong>${x.title}</strong></div>
    <div style="margin-top:6px"><strong>Khi nào dùng?</strong> ${x.when}</div>
  `;
  document.getElementById("proof").textContent = x.example;
}

draw();
</script>

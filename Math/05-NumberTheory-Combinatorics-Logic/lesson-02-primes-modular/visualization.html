<h1>Lesson 02 (T5) — Số nguyên tố &amp; Đồng dư</h1>

<h2>Sàng Eratosthenes</h2>
<div class="card">
  <div class="row">
    <label>N (đến):</label>
    <input type="range" id="N" min="20" max="200" step="10" value="100" oninput="sieve()">
    <span class="stat">N = <strong id="vN">100</strong></span>
    <span class="stat">Số nguyên tố ≤ N: <strong id="pc">25</strong></span>
  </div>
  <div class="sieve-grid" id="grid"></div>
</div>

<h2>Phân tích thừa số nguyên tố</h2>
<div class="card">
  <div class="row">
    <label>n:</label>
    <input type="number" id="n" value="504" oninput="factor()">
  </div>
  <div class="result" id="fact"></div>
</div>

<h2>Tính a^N mod m</h2>
<div class="card">
  <p>Dùng định lý Fermat / Euler để tính nhanh khi N rất lớn.</p>
  <div class="row">
    <label>a:</label><input type="number" id="ma" value="3">
    <label>N (lũy thừa):</label><input type="number" id="mN" value="100">
    <label>m:</label><input type="number" id="mm" value="7">
  </div>
  <button onclick="modPow()" style="background:#15803d; color:white; border:none; padding:8px 14px; border-radius:4px; cursor:pointer; font-weight:600">Tính</button>
  <div class="result" id="mres"></div>
</div>

<script>
function sieve() {
  const N = parseInt(document.getElementById("N").value);
  document.getElementById("vN").textContent = N;
  const isPrime = new Array(N+1).fill(true);
  isPrime[0] = isPrime[1] = false;
  for (let i = 2; i*i <= N; i++) if (isPrime[i]) for (let j = i*i; j <= N; j += i) isPrime[j] = false;
  let primes = 0;
  let html = "";
  for (let i = 1; i <= N; i++) {
    let cls = i === 1 ? "one" : isPrime[i] ? "prime" : "composite";
    if (isPrime[i]) primes++;
    html += `<div class="sieve-cell ${cls}">${i}</div>`;
  }
  document.getElementById("grid").innerHTML = html;
  document.getElementById("pc").textContent = primes;
}

function factor() {
  let n = parseInt(document.getElementById("n").value);
  if (!n || n < 2) { document.getElementById("fact").innerHTML = "<strong>Nhập n ≥ 2.</strong>"; return; }
  const orig = n;
  const factors = {};
  for (let p = 2; p*p <= n; p++) {
    while (n % p === 0) { factors[p] = (factors[p] || 0) + 1; n /= p; }
  }
  if (n > 1) factors[n] = (factors[n] || 0) + 1;

  const parts = Object.entries(factors).map(([p, e]) => e === 1 ? p : `${p}^${e}`);
  // Phi(n)
  let phi = orig;
  Object.keys(factors).forEach(p => phi = phi * (parseInt(p) - 1) / parseInt(p));
  // Divisor count
  let divCount = 1;
  Object.values(factors).forEach(e => divCount *= (e+1));

  document.getElementById("fact").innerHTML = `
    <div style="font-family:monospace; font-size:15px"><strong>${orig} = ${parts.join(" · ")}</strong></div>
    <div class="row" style="margin-top:6px">
      <span class="stat">Số ước: <strong>${divCount}</strong></span>
      <span class="stat">φ(${orig}) = <strong>${phi}</strong></span>
      <span class="stat">${Object.keys(factors).length === 1 && factors[orig] === 1 ? "✅ Nguyên tố" : Object.keys(factors).length === 1 ? "Lũy thừa nguyên tố" : "Hợp số"}</span>
    </div>
  `;
}

function modPow() {
  const a = parseInt(document.getElementById("ma").value);
  const N = parseInt(document.getElementById("mN").value);
  const m = parseInt(document.getElementById("mm").value);
  if (!a || !N || !m || m < 2) { document.getElementById("mres").innerHTML = "<strong>Nhập a, N, m hợp lệ.</strong>"; return; }
  // Fast exponentiation
  let result = 1, base = a % m, exp = N;
  while (exp > 0) {
    if (exp & 1) result = (result * base) % m;
    base = (base * base) % m;
    exp >>= 1;
  }
  // Check if m is prime for Fermat hint
  let isPrime = m > 1;
  for (let i = 2; i*i <= m; i++) if (m % i === 0) { isPrime = false; break; }

  document.getElementById("mres").innerHTML = `
    <div style="font-family:monospace; font-size:15px"><strong>${a}^${N} mod ${m} = ${result}</strong></div>
    ${isPrime && a % m !== 0 ? `<div style="margin-top:6px; font-size:13px">m = ${m} nguyên tố. Theo Fermat: ${a}^${m-1} ≡ 1 (mod ${m}). ⟹ ${a}^${N} ≡ ${a}^(${N} mod ${m-1}) = ${a}^${N % (m-1)} (mod ${m}).</div>` : ""}
  `;
}

sieve();
factor();
modPow();
</script>

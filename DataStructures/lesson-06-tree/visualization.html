<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lesson 06 — Tree traversals trực quan</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 24px; background: #f6f7f9; }
  .panel { background: #fff; border-radius: 8px; padding: 16px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 16px; }
  h1 { margin-top: 0; }
  svg { background: #fafafa; border: 1px solid #eee; border-radius: 6px; display: block; }
  .node-c { fill: #fff; stroke: #333; stroke-width: 2; transition: fill .25s, stroke .25s; }
  .node-c.visited { fill: #fef08a; stroke: #ca8a04; }
  .node-c.current { fill: #d1fae5; stroke: #10b981; }
  .edge { stroke: #888; stroke-width: 2; }
  text { font: 600 14px sans-serif; text-anchor: middle; dominant-baseline: central; }
  button { background: #3b82f6; color: #fff; border: 0; padding: 8px 14px; border-radius: 6px; cursor: pointer; margin-right: 6px; }
  .order { background: #f3f4f6; padding: 10px; border-radius: 4px; margin-top: 12px; font-family: monospace; min-height: 24px; }
</style>
</head>
<body>
<h1>Binary Tree — Bốn cách duyệt</h1>
<div class="panel">
  <button onclick="run('preorder')">Preorder</button>
  <button onclick="run('inorder')">Inorder</button>
  <button onclick="run('postorder')">Postorder</button>
  <button onclick="run('level')">Level-order</button>
  <button onclick="reset()">Reset</button>
  <svg id="svg" width="720" height="380"></svg>
  <div class="order" id="order">Thứ tự duyệt sẽ hiển thị ở đây.</div>
</div>

<script>
// Cây mẫu (val, x, y, left_idx, right_idx)
const T = [
  { v: 1, x: 360, y: 40 },
  { v: 2, x: 200, y: 120, p: 0 },
  { v: 3, x: 520, y: 120, p: 0 },
  { v: 4, x: 120, y: 220, p: 1 },
  { v: 5, x: 280, y: 220, p: 1 },
  { v: 6, x: 600, y: 220, p: 2 },
];
const children = { 0: [1,2], 1: [3,4], 2: [null,5] };
const svg = document.getElementById('svg');
function render(hl = {}) {
  svg.innerHTML = '';
  // edges
  T.forEach((n, i) => {
    if (n.p !== undefined) {
      const p = T[n.p];
      svg.insertAdjacentHTML('beforeend',
        `<line class="edge" x1="${p.x}" y1="${p.y}" x2="${n.x}" y2="${n.y}"/>`);
    }
  });
  // nodes
  T.forEach((n, i) => {
    const klass = 'node-c ' + (hl[i] || '');
    svg.insertAdjacentHTML('beforeend',
      `<circle class="${klass}" cx="${n.x}" cy="${n.y}" r="22"/>
       <text x="${n.x}" y="${n.y}">${n.v}</text>`);
  });
}
function left(i)  { return children[i] && children[i][0] !== undefined ? children[i][0] : null; }
function right(i) { return children[i] && children[i][1] !== undefined ? children[i][1] : null; }

function buildOrder(mode) {
  const order = [];
  function dfs(i, m) {
    if (i === null || i === undefined) return;
    if (m === 'preorder') order.push(i);
    dfs(left(i), m);
    if (m === 'inorder') order.push(i);
    dfs(right(i), m);
    if (m === 'postorder') order.push(i);
  }
  if (mode === 'level') {
    const q = [0]; while (q.length) {
      const x = q.shift(); order.push(x);
      const l = left(x), r = right(x);
      if (l !== null) q.push(l);
      if (r !== null) q.push(r);
    }
  } else dfs(0, mode);
  return order;
}

let busy = false;
async function run(mode) {
  if (busy) return; busy = true;
  const order = buildOrder(mode);
  const out = document.getElementById('order');
  out.textContent = `${mode}: `;
  const hl = {};
  for (const i of order) {
    hl[i] = 'current';
    render(hl);
    await sleep(550);
    hl[i] = 'visited';
    out.textContent += T[i].v + ' ';
    render(hl);
  }
  busy = false;
}
function reset() { render(); document.getElementById('order').textContent = 'Thứ tự duyệt sẽ hiển thị ở đây.'; }
render();
</script>
</body>
</html>

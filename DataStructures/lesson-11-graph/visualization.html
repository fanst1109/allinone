<main>

<h1>Graph — BFS vs DFS</h1>

<div class="panel">
  <div class="row">
    <label>Bắt đầu từ: <select id="start"><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select></label>
    <button onclick="runBFS()">Chạy BFS</button>
    <button onclick="runDFS()">Chạy DFS</button>
    <button onclick="reset()">Reset</button>
  </div>
  <svg id="svg" width="760" height="380"></svg>
  <div>Frontier (queue cho BFS / stack cho DFS): <div class="frontier-box" id="frontier">[]</div></div>
  <div>Thứ tự thăm: <div class="frontier-box" id="order"></div></div>
  <div class="log" id="log">BFS dùng queue: thăm gần trước xa sau. DFS dùng stack/đệ quy: đi sâu một nhánh trước khi quay lại.</div>
</div>

<script>
const positions = [
  { x: 100, y: 80 }, { x: 280, y: 80 }, { x: 460, y: 80 }, { x: 640, y: 80 },
  { x: 190, y: 280 }, { x: 370, y: 280 }, { x: 550, y: 280 }
];
const edges = [
  [0, 1], [1, 2], [2, 3], [0, 4], [1, 4], [1, 5], [2, 5], [2, 6], [3, 6], [4, 5], [5, 6]
];
const adj = {};
for (let i = 0; i < 7; i++) adj[i] = [];
edges.forEach(([u, v]) => { adj[u].push(v); adj[v].push(u); });

let visited = new Set(), current = -1, frontier = [], order = [], usedEdges = new Set();

function render() {
  const svg = document.getElementById('svg');
  svg.innerHTML = '';
  edges.forEach(([u, v]) => {
    const k = u + '-' + v, rk = v + '-' + u;
    const used = usedEdges.has(k) || usedEdges.has(rk);
    const p = positions[u], q = positions[v];
    svg.insertAdjacentHTML('beforeend',
      `<line class="edge ${used ? 'used' : ''}" x1="${p.x}" y1="${p.y}" x2="${q.x}" y2="${q.y}"/>`);
  });
  for (let i = 0; i < 7; i++) {
    let cls = '';
    if (i === current) cls = 'current';
    else if (visited.has(i)) cls = 'visited';
    else if (frontier.includes(i)) cls = 'frontier';
    svg.insertAdjacentHTML('beforeend',
      `<circle class="node-c ${cls}" cx="${positions[i].x}" cy="${positions[i].y}" r="22"/>
       <text x="${positions[i].x}" y="${positions[i].y}">${i}</text>`);
  }
  document.getElementById('frontier').textContent = '[' + frontier.join(', ') + ']';
  document.getElementById('order').textContent = order.join(' → ');
}

async function runBFS() {
  reset();
  const start = parseInt(document.getElementById('start').value);
  frontier = [start]; visited.add(start);
  log('BFS: queue khởi tạo = [' + start + '].');
  render();
  await sleep(700);
  while (frontier.length) {
    current = frontier.shift();
    order.push(current);
    log(`Lấy ${current} ra khỏi queue, thăm. Tìm hàng xóm chưa thăm.`);
    render();
    await sleep(600);
    for (const nb of adj[current]) {
      if (!visited.has(nb)) {
        visited.add(nb); frontier.push(nb);
        usedEdges.add(current + '-' + nb);
        log(`Thêm ${nb} vào queue (cạnh ${current}-${nb}).`);
        render();
        await sleep(400);
      }
    }
    current = -1;
  }
  log('BFS xong. Thứ tự thăm: ' + order.join(' → '));
  render();
}

async function runDFS() {
  reset();
  const start = parseInt(document.getElementById('start').value);
  frontier = [start]; visited.add(start);
  log('DFS: stack khởi tạo = [' + start + '].');
  render();
  await sleep(700);
  while (frontier.length) {
    current = frontier.pop();
    order.push(current);
    log(`Lấy ${current} từ đỉnh stack, thăm.`);
    render();
    await sleep(600);
    // Push neighbors (reverse for natural order)
    const nbs = adj[current].filter(n => !visited.has(n)).reverse();
    for (const nb of nbs) {
      visited.add(nb); frontier.push(nb);
      usedEdges.add(current + '-' + nb);
    }
    log(`Đẩy hàng xóm chưa thăm vào stack: [${adj[current].filter(n => usedEdges.has(current + '-' + n)).join(', ')}]`);
    render();
    await sleep(500);
    current = -1;
  }
  log('DFS xong. Thứ tự thăm: ' + order.join(' → '));
  render();
}

function reset() { visited = new Set(); current = -1; frontier = []; order = []; usedEdges = new Set(); render(); }
function log(m) { document.getElementById('log').textContent = m; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
render();
</script>
<div class="readme-backdrop" id="readmeBackdrop" onclick="if(event.target===this)closeReadme()">
  <div class="readme-modal">
    <button class="close" onclick="closeReadme()" aria-label="Đóng">×</button>
    <div class="content" id="readmeContent">Đang tải README…</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
function openReadme() {
  document.getElementById('readmeBackdrop').classList.add('open');
  const el = document.getElementById('readmeContent');
  if (el.dataset.loaded === '1') return;
  fetch('./README.md').then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(md => {
      el.innerHTML = (typeof marked !== 'undefined' && marked.parse)
        ? marked.parse(md) : '<pre>' + md.replace(/</g, '&lt;') + '</pre>';
      el.dataset.loaded = '1';
    })
    .catch(() => {
      el.innerHTML =
        '<div class="fallback"><strong>Không tải được README qua <code>file://</code></strong> ' +
        '(trình duyệt chặn <code>fetch</code> cho local file).<br><br>' +
        'Cách khắc phục:<br>' +
        '· Mở trực tiếp file: <a href="./README.md" target="_blank">README.md</a><br>' +
        '· Hoặc chạy web server đơn giản trong thư mục lĩnh vực:<br>' +
        '<pre>cd DataStructures &amp;&amp; python3 -m http.server 8000</pre>' +
        'rồi mở <a href="http://localhost:8000/">http://localhost:8000/</a></div>';
    });
}
function closeReadme() { document.getElementById('readmeBackdrop').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReadme(); });
</script>

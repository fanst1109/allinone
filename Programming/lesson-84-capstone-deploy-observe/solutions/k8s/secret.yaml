# secret.yaml — dữ liệu NHẠY CẢM (DB password, API key). KHÔNG commit giá trị thật!
#
# CẢNH BÁO: Secret của K8s chỉ base64-encode, KHÔNG mã hoá. Bất kỳ ai có quyền
# đọc Secret đều xem được. Production:
#   - Bật encryption-at-rest cho etcd (EncryptionConfiguration).
#   - Dùng external secret manager: Sealed Secrets / External Secrets Operator /
#     HashiCorp Vault / cloud KMS (AWS Secrets Manager, GCP Secret Manager).
#   - KHÔNG commit file này có giá trị thật vào git — đây chỉ là TEMPLATE demo.
#
# Tạo nhanh từ literal (cách thực dụng, không commit value):
#   kubectl create secret generic urlshortener-secret \
#     --from-literal=DB_PASSWORD='s3cr3t-pw' \
#     --from-literal=DB_USER='urlshortener'
apiVersion: v1
kind: Secret
metadata:
  name: urlshortener-secret
  labels:
    app: urlshortener
type: Opaque
# stringData: ghi plaintext, K8s tự encode (tiện cho demo). Production dùng
# `data:` với base64 hoặc external secret.
stringData:
  DB_USER: "urlshortener"
  DB_PASSWORD: "CHANGE_ME_dev_only"

<main>

<h1>Lesson 07 — Hàm số</h1>

<h2>Function Grapher</h2>
<div class="card">
  <div class="row">
    <span>f(x) =</span>
    <input type="text" id="funcInput" value="x*x">
    <select id="examples" onchange="setExample()">
      <option value="">Ví dụ...</option>
      <option value="x*x">x²</option>
      <option value="x*x*x">x³</option>
      <option value="Math.sqrt(x)">√x</option>
      <option value="1/x">1/x</option>
      <option value="Math.sin(x)">sin(x)</option>
      <option value="Math.exp(x)">eˣ</option>
      <option value="Math.log(x)">ln(x)</option>
      <option value="Math.abs(x)">|x|</option>
    </select>
  </div>
  <svg class="scene" id="fSvg" viewBox="0 0 600 400"></svg>
  <div class="result" id="fResult"></div>
</div>

<script>
function setExample() {
  document.getElementById("funcInput").value = document.getElementById("examples").value;
  draw();
}

function draw() {
  const expr = document.getElementById("funcInput").value;
  let fn;
  try { fn = new Function("x", "return " + expr); fn(1); }
  catch (e) { document.getElementById("fResult").innerHTML = `<span style="color:#dc2626">Lỗi: ${e.message}</span>`; return; }

  const svg = document.getElementById("fSvg");
  svg.innerHTML = "";
  const W = 600, H = 400, cx = W/2, cy = H/2;
  const scale = 30;

  // Grid + axes
  for (let i = -10; i <= 10; i++) {
    const x = cx + i*scale;
    const y = cy + i*scale;
    const g1 = document.createElementNS("http://www.w3.org/2000/svg", "line");
    g1.setAttribute("x1", x); g1.setAttribute("y1", 0); g1.setAttribute("x2", x); g1.setAttribute("y2", H);
    g1.setAttribute("stroke", i === 0 ? "#1a202c" : "#e2e8f0"); g1.setAttribute("stroke-width", i === 0 ? 1.5 : 0.5);
    svg.appendChild(g1);
    const g2 = document.createElementNS("http://www.w3.org/2000/svg", "line");
    g2.setAttribute("x1", 0); g2.setAttribute("y1", y); g2.setAttribute("x2", W); g2.setAttribute("y2", y);
    g2.setAttribute("stroke", i === 0 ? "#1a202c" : "#e2e8f0"); g2.setAttribute("stroke-width", i === 0 ? 1.5 : 0.5);
    svg.appendChild(g2);
  }

  // Curve
  let path = "";
  let started = false;
  for (let xm = -10; xm <= 10; xm += 0.05) {
    let ym;
    try { ym = fn(xm); } catch (e) { started = false; continue; }
    if (!isFinite(ym)) { started = false; continue; }
    const x = cx + xm*scale;
    const y = cy - ym*scale;
    if (y > -100 && y < H + 100) {
      path += (started ? " L " : " M ") + x + " " + y;
      started = true;
    } else { started = false; }
  }
  const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
  p.setAttribute("d", path); p.setAttribute("fill", "none"); p.setAttribute("stroke", "#15803d"); p.setAttribute("stroke-width", 2.5);
  svg.appendChild(p);

  document.getElementById("fResult").innerHTML = `<div style="font-family:monospace; font-size:15px">f(x) = ${expr}</div><div style="margin-top:6px; font-size:13px">Đồ thị trên Oxy. Mỗi điểm (x, y) thỏa y = f(x).</div>`;
}

document.getElementById("funcInput").addEventListener("input", draw);
draw();
</script>

</main>

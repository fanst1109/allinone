<body>

<main>
<h1>Hash Table — Chaining</h1>

<div class="panel">
  <div>
    <label>Key: <input id="k" type="text" value="alice" style="width:120px"></label>
    <label>Value: <input id="v" type="number" value="100" style="width:80px"></label>
    <button onclick="put()">Put</button>
    <button onclick="get()">Get</button>
    <button onclick="del()">Remove</button>
    <button onclick="reset()">Reset</button>
  </div>
  <div class="stats" id="stats"></div>
  <div class="buckets" id="buckets"></div>
  <div class="log" id="log"></div>
</div>

<script>
const CAP = 8;
let buckets = Array.from({length: CAP}, () => []);
let hl = {}; // bucket -> 'new' / 'hit'
function hash(k) {
  let h = 2166136261;
  for (const c of k) { h ^= c.charCodeAt(0); h = (h * 16777619) >>> 0; }
  return h % CAP;
}
function render() {
  const root = document.getElementById('buckets');
  root.innerHTML = '';
  let total = 0, maxLen = 0;
  for (let i = 0; i < CAP; i++) {
    total += buckets[i].length;
    maxLen = Math.max(maxLen, buckets[i].length);
    const idx = document.createElement('div'); idx.className = 'bidx'; idx.textContent = i;
    const chain = document.createElement('div'); chain.className = 'chain';
    buckets[i].forEach(([k, v], j) => {
      const item = document.createElement('div');
      const klass = hl[`${i}-${j}`] || '';
      item.className = 'item ' + klass;
      item.textContent = `${k}=${v}`;
      chain.appendChild(item);
    });
    root.appendChild(idx); root.appendChild(chain);
  }
  document.getElementById('stats').textContent =
    `Tổng phần tử: ${total} · Bucket dài nhất: ${maxLen} · Load factor: ${(total/CAP).toFixed(2)}`;
  setTimeout(() => { hl = {}; }, 600);
}
function put() {
  const k = document.getElementById('k').value;
  const v = parseInt(document.getElementById('v').value);
  if (!k) return;
  const i = hash(k);
  const existing = buckets[i].findIndex(([kk]) => kk === k);
  if (existing >= 0) {
    buckets[i][existing][1] = v;
    hl[`${i}-${existing}`] = 'hit';
    document.getElementById('log').textContent = `Cập nhật ${k}=${v} tại bucket ${i}, index ${existing}`;
  } else {
    buckets[i].push([k, v]);
    hl[`${i}-${buckets[i].length-1}`] = 'new';
    document.getElementById('log').textContent =
      `hash(${k}) = ${i}. ` + (buckets[i].length > 1 ? `Xung đột! Thêm vào cuối chain (giờ dài ${buckets[i].length}).` : `Bucket trống, thêm trực tiếp.`);
  }
  render();
}
function get() {
  const k = document.getElementById('k').value;
  const i = hash(k);
  const idx = buckets[i].findIndex(([kk]) => kk === k);
  if (idx >= 0) {
    hl[`${i}-${idx}`] = 'hit';
    document.getElementById('log').textContent = `get(${k}) = ${buckets[i][idx][1]} tại bucket ${i} (duyệt ${idx+1} phần tử của chain).`;
  } else {
    document.getElementById('log').textContent = `get(${k}): không tìm thấy (hash về bucket ${i}, đã duyệt hết chain).`;
  }
  render();
}
function del() {
  const k = document.getElementById('k').value;
  const i = hash(k);
  const idx = buckets[i].findIndex(([kk]) => kk === k);
  if (idx >= 0) {
    buckets[i].splice(idx, 1);
    document.getElementById('log').textContent = `Đã xóa ${k} khỏi bucket ${i}.`;
  } else {
    document.getElementById('log').textContent = `Không có ${k} để xóa.`;
  }
  render();
}
function reset() { buckets = Array.from({length: CAP}, () => []); render(); document.getElementById('log').textContent = ''; }
render();
</script>
<div class="readme-backdrop" id="readmeBackdrop" onclick="if(event.target===this)closeReadme()">
  <div class="readme-modal">
    <button class="close" onclick="closeReadme()" aria-label="Đóng">×</button>
    <div class="content" id="readmeContent">Đang tải README…</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
function openReadme() {
  document.getElementById('readmeBackdrop').classList.add('open');
  const el = document.getElementById('readmeContent');
  if (el.dataset.loaded === '1') return;
  fetch('./README.md').then(r => r.ok ? r.text() : Promise.reject(r.status))
    .then(md => {
      el.innerHTML = (typeof marked !== 'undefined' && marked.parse)
        ? marked.parse(md) : '<pre>' + md.replace(/</g, '&lt;') + '</pre>';
      el.dataset.loaded = '1';
    })
    .catch(() => {
      el.innerHTML =
        '<div class="fallback"><strong>Không tải được README qua <code>file://</code></strong> ' +
        '(trình duyệt chặn <code>fetch</code> cho local file).<br><br>' +
        'Cách khắc phục:<br>' +
        '· Mở trực tiếp file: <a href="./README.md" target="_blank">README.md</a><br>' +
        '· Hoặc chạy web server đơn giản trong thư mục lĩnh vực:<br>' +
        '<pre>cd DataStructures &amp;&amp; python3 -m http.server 8000</pre>' +
        'rồi mở <a href="http://localhost:8000/">http://localhost:8000/</a></div>';
    });
}
function closeReadme() { document.getElementById('readmeBackdrop').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReadme(); });
</script>
</main>

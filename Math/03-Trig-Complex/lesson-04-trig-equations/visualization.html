<h1>Lesson 04 (T3) — Phương trình lượng giác</h1>

<h2>Giải PT cơ bản f(x) = a — Trực quan giao điểm</h2>
<div class="card">
  <p>Mỗi giao điểm của đường y = a với đồ thị hàm lượng giác là 1 nghiệm. PT có vô số nghiệm do tính tuần hoàn.</p>
  <div class="row">
    <button id="bS" onclick="setF('sin')" class="active">sin x</button>
    <button id="bC" onclick="setF('cos')">cos x</button>
    <button id="bT" onclick="setF('tan')">tan x</button>
    <label>a:</label>
    <input type="range" id="aV" min="-1.5" max="1.5" step="0.05" value="0.5" oninput="draw()">
    <span class="stat">a = <strong id="vA">0.5</strong></span>
  </div>
  <svg class="scene" id="svg" viewBox="0 0 700 350"></svg>
  <div class="result" id="res"></div>
</div>

<script>
let func = "sin";

function setF(f) {
  func = f;
  ["S","C","T"].forEach(c => document.getElementById("b"+c).classList.remove("active"));
  document.getElementById("b" + {sin:"S", cos:"C", tan:"T"}[f]).classList.add("active");
  draw();
}

function draw() {
  const a = parseFloat(document.getElementById("aV").value);
  document.getElementById("vA").textContent = a.toFixed(2);

  const svg = document.getElementById("svg");
  svg.innerHTML = "";
  const W_PX = 700, H_PX = 350, cx = 50, cy = H_PX/2;
  const xMin = -2*Math.PI, xMax = 4*Math.PI;
  const xSpan = xMax - xMin;
  const scale = (W_PX - 80) / xSpan;
  const yScale = 80;
  const xToPx = x => cx + (x - xMin) * scale;

  // Grid + axes
  for (let i = -2; i <= 4; i++) {
    const x = xToPx(i * Math.PI);
    const g = document.createElementNS("http://www.w3.org/2000/svg", "line");
    g.setAttribute("x1", x); g.setAttribute("y1", 20); g.setAttribute("x2", x); g.setAttribute("y2", H_PX-30);
    g.setAttribute("stroke", i === 0 ? "#1a202c" : "#e2e8f0"); g.setAttribute("stroke-width", i === 0 ? 1.5 : 0.5);
    svg.appendChild(g);
    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("x", x); t.setAttribute("y", cy+16); t.setAttribute("text-anchor", "middle"); t.setAttribute("font-size", "11");
    t.textContent = i === 0 ? "0" : i + "π";
    svg.appendChild(t);
  }
  const xax = document.createElementNS("http://www.w3.org/2000/svg", "line");
  xax.setAttribute("x1", cx); xax.setAttribute("y1", cy); xax.setAttribute("x2", W_PX-30); xax.setAttribute("y2", cy);
  xax.setAttribute("stroke", "#1a202c"); xax.setAttribute("stroke-width", 1.5);
  svg.appendChild(xax);

  // Function
  const fnMap = {sin: Math.sin, cos: Math.cos, tan: Math.tan};
  const fn = fnMap[func];
  let path = "";
  let started = false;
  for (let x = xMin; x <= xMax; x += 0.01) {
    const y = fn(x);
    if (!isFinite(y) || y > 3 || y < -3) { started = false; continue; }
    const px = xToPx(x);
    const py = cy - y * yScale;
    path += (started ? "L" : "M") + px + " " + py + " ";
    started = true;
  }
  const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
  p.setAttribute("d", path); p.setAttribute("fill", "none"); p.setAttribute("stroke", "#1d4ed8"); p.setAttribute("stroke-width", 2);
  svg.appendChild(p);

  // y = a line
  const ya = cy - a * yScale;
  if (ya > 30 && ya < H_PX - 30) {
    const al = document.createElementNS("http://www.w3.org/2000/svg", "line");
    al.setAttribute("x1", cx); al.setAttribute("y1", ya); al.setAttribute("x2", W_PX-30); al.setAttribute("y2", ya);
    al.setAttribute("stroke", "#dc2626"); al.setAttribute("stroke-width", 2); al.setAttribute("stroke-dasharray", "5,3");
    svg.appendChild(al);
    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("x", W_PX-25); t.setAttribute("y", ya); t.setAttribute("fill", "#dc2626"); t.setAttribute("font-size", "13"); t.setAttribute("font-weight", "700");
    t.textContent = "y = " + a.toFixed(2);
    svg.appendChild(t);
  }

  // Find intersections numerically and mark
  let solutions = [];
  let errorMsg = "";
  let formula = "";

  if (func === "sin") {
    if (Math.abs(a) > 1) { errorMsg = "VÔ NGHIỆM (|a| > 1)."; }
    else {
      const alpha = Math.asin(a);
      formula = `sin x = ${a.toFixed(3)} → x = ${alpha.toFixed(3)} + k·2π hoặc x = π − ${alpha.toFixed(3)} = ${(Math.PI-alpha).toFixed(3)} + k·2π`;
      for (let k = -2; k <= 2; k++) {
        solutions.push(alpha + k*2*Math.PI);
        solutions.push(Math.PI - alpha + k*2*Math.PI);
      }
    }
  } else if (func === "cos") {
    if (Math.abs(a) > 1) { errorMsg = "VÔ NGHIỆM (|a| > 1)."; }
    else {
      const alpha = Math.acos(a);
      formula = `cos x = ${a.toFixed(3)} → x = ±${alpha.toFixed(3)} + k·2π`;
      for (let k = -2; k <= 2; k++) {
        solutions.push(alpha + k*2*Math.PI);
        solutions.push(-alpha + k*2*Math.PI);
      }
    }
  } else {
    const alpha = Math.atan(a);
    formula = `tan x = ${a.toFixed(3)} → x = ${alpha.toFixed(3)} + k·π`;
    for (let k = -3; k <= 4; k++) solutions.push(alpha + k*Math.PI);
  }

  solutions = solutions.filter(s => s >= xMin && s <= xMax);
  solutions.forEach(s => {
    const px = xToPx(s);
    const py = cy - a * yScale;
    const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", px); c.setAttribute("cy", py); c.setAttribute("r", 5);
    c.setAttribute("fill", "#15803d");
    svg.appendChild(c);
  });

  document.getElementById("res").innerHTML = `
    ${errorMsg ? `<div style="color:#dc2626; font-weight:700">${errorMsg}</div>` : `
      <div style="font-family:monospace; font-size:14px">${formula}</div>
      <div style="margin-top:8px"><strong>${solutions.length} nghiệm trong khoảng [−2π, 4π]:</strong></div>
      <div style="font-family:monospace; font-size:13px">${solutions.map(s => s.toFixed(3)).join(", ")}</div>
    `}
  `;
}

draw();
</script>

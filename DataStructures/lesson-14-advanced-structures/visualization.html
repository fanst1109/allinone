<h1>Bloom Filter — Bộ lọc xác suất</h1>

<div class="panel">
  <div class="stats" id="stats">Bảng 64 bit, k = 3 hàm hash. Thêm và kiểm tra bằng cách hash bằng 3 hàm khác nhau.</div>
  <div class="row" style="margin-top:10px">
    <input id="key" type="text" value="alice">
    <button onclick="doAdd()">Add</button>
    <button onclick="doCheck()">Check</button>
    <button onclick="reset()">Reset</button>
  </div>
  <div class="bits" id="bits"></div>
  <div>Đã thêm: <div class="added" id="added"></div></div>
  <div class="log" id="log">Add: bật 3 bit ứng với 3 hash. Check: cả 3 bit cùng bật → "có thể có"; có bit nào tắt → "chắc chắn không có".</div>
</div>

<script>
const M = 64, K = 3;
let bits = new Array(M).fill(false);
let added = new Set();

// Ba hàm hash đơn giản, đủ khác biệt
function h1(s) { let h = 5381; for (const c of s) h = ((h << 5) + h + c.charCodeAt(0)) >>> 0; return h % M; }
function h2(s) { let h = 2166136261; for (const c of s) { h ^= c.charCodeAt(0); h = (h * 16777619) >>> 0; } return h % M; }
function h3(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i) * 7 + 13) >>> 0; return h % M; }

function hashes(s) { return [h1(s), h2(s), h3(s)]; }

function renderBits(highlighted = [], fresh = []) {
  const root = document.getElementById('bits');
  root.innerHTML = '';
  const hSet = new Set(highlighted), fSet = new Set(fresh);
  for (let i = 0; i < M; i++) {
    const d = document.createElement('div');
    d.className = 'bit' + (bits[i] ? ' set' : '') + (hSet.has(i) ? ' hashed' : '') + (fSet.has(i) ? ' fresh' : '');
    d.textContent = i;
    root.appendChild(d);
  }
  const a = document.getElementById('added');
  a.innerHTML = '';
  [...added].forEach(k => { const c = document.createElement('span'); c.className = 'chip'; c.textContent = k; a.appendChild(c); });
  document.getElementById('stats').textContent =
    `Bảng 64 bit · k = 3 hàm · Đã add ${added.size} key · Bit đã bật: ${bits.filter(x => x).length}/${M}`;
}

function doAdd() {
  const s = document.getElementById('key').value.trim();
  if (!s) return;
  const idxs = hashes(s);
  const beforeFresh = idxs.filter(i => !bits[i]);
  idxs.forEach(i => bits[i] = true);
  added.add(s);
  renderBits(idxs, beforeFresh);
  document.getElementById('log').textContent =
    `Add "${s}": h1=${idxs[0]}, h2=${idxs[1]}, h3=${idxs[2]} → bật 3 bit này.`;
}

function doCheck() {
  const s = document.getElementById('key').value.trim();
  if (!s) return;
  const idxs = hashes(s);
  const allSet = idxs.every(i => bits[i]);
  renderBits(idxs);
  const reallyHas = added.has(s);
  let msg = `Check "${s}": h1=${idxs[0]} (${bits[idxs[0]] ? '✓' : '✗'}), h2=${idxs[1]} (${bits[idxs[1]] ? '✓' : '✗'}), h3=${idxs[2]} (${bits[idxs[2]] ? '✓' : '✗'}) → `;
  if (!allSet) msg += `CHẮC CHẮN không có (có bit tắt).`;
  else if (reallyHas) msg += `"có thể có" → đúng (đã add trước đó).`;
  else msg += `"có thể có" → nhưng THỰC TẾ chưa add — FALSE POSITIVE!`;
  document.getElementById('log').textContent = msg;
}

function reset() { bits = new Array(M).fill(false); added = new Set(); renderBits(); document.getElementById('log').textContent = 'Reset.'; }
renderBits();
</script>
